<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Carnival Logic</title><style>*{box-sizing:border-box}body{margin:0;font-family:Trebuchet MS,sans-serif;background:repeating-linear-gradient(45deg,#f8d34f 0 30px,#ef5350 30px 60px);color:#1d1740;min-height:100vh;display:grid;place-items:center}.w{width:min(760px,94vw);padding:30px;background:#fff8e7;border:8px double #1d1740;transform:rotate(-.25deg)}a{color:#1d1740}h1{font-size:clamp(2.2rem,7vw,4.8rem);margin:.2rem 0}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:24px 0}.tile{border:3px solid #1d1740;border-radius:50% 45% 48% 42%;background:#fff;color:#1d1740;font-weight:900;min-height:92px;padding:8px;cursor:pointer;box-shadow:4px 4px 0 #1d1740}.tile.sel{background:#76e6e6;transform:rotate(3deg) scale(.95)}.solved{padding:16px;margin:10px 0;border:3px solid #1d1740;font-weight:900}.ctrl{padding:12px 18px;border:3px solid #1d1740;background:#fff;color:#1d1740;font-weight:900;box-shadow:3px 3px 0 #1d1740}.msg{min-height:28px;font-weight:800}@media(max-width:600px){.tile{min-height:74px;font-size:.75rem}}</style><main class="w"><small>BIG TOP CONNECTIONS 04</small><h1>Carnival Logic</h1><a href="index.html">Exit tent</a><p>Sort the sideshow into three acts.</p><div id="solved"></div><div class="grid" id="grid"></div><div class="msg" id="msg"></div><button class="ctrl" onclick="shuffle()">SPIN</button> <button class="ctrl" onclick="submitSet()">TA-DA!</button></main><script>const groups=[{n:'Circus performers',c:'#ff8fab',w:['CLOWN','JUGGLER','ACROBAT','RINGMASTER']},{n:'Things that spin',c:'#76e6e6',w:['TOP','WHEEL','RECORD','PLANET']},{n:'Can follow “magic”',c:'#ffe66d',w:['TRICK','WAND','WORD','CARPET']}];let left=groups.flatMap(g=>g.w),sel=[];const G=grid,S=solved,M=msg;function render(){G.innerHTML='';left.forEach(w=>{let b=document.createElement('button');b.className='tile'+(sel.includes(w)?' sel':'');b.textContent=w;b.onclick=()=>{sel.includes(w)?sel=sel.filter(x=>x!==w):sel.length<4&&sel.push(w);render()};G.appendChild(b)})}function shuffle(){left.sort(()=>Math.random()-.5);render()}function submitSet(){if(sel.length!==4){M.textContent='The act needs four!';return}let g=groups.find(g=>sel.every(x=>g.w.includes(x)));if(!g){M.textContent='Buzzer! Try another act.';sel=[];render();return}left=left.filter(x=>!sel.includes(x));let d=document.createElement('div');d.className='solved';d.style.background=g.c;d.innerHTML=g.n+'<br><small>'+g.w.join(' · ')+'</small>';S.appendChild(d);sel=[];M.textContent=left.length?'Applause! Again!':'Standing ovation!';render()}shuffle()</script>
