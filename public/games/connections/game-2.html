<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Deep Archive</title><style>:root{--bg:#09131f;--card:#dce8f2;--ink:#102233;--accent:#78b7ff}*{box-sizing:border-box}body{margin:0;font-family:Georgia,serif;background:linear-gradient(#07101a,#132b3e);color:#fff;min-height:100vh;display:grid;place-items:center}.w{width:min(760px,94vw);padding:30px}a{color:#fff}h1{font-size:clamp(2.2rem,7vw,4.8rem);margin:.2rem 0}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:24px 0}.tile{border:1px solid #173149;border-radius:4px;background:var(--card);color:var(--ink);font-weight:700;min-height:92px;padding:8px;cursor:pointer}.tile.sel{outline:4px solid var(--accent)}.solved{padding:16px;margin:10px 0;color:#0b1722;font-weight:700}.ctrl{padding:12px 18px;border:1px solid #fff8;background:transparent;color:#fff}.msg{min-height:28px}@media(max-width:600px){.tile{min-height:74px;font-size:.78rem}}</style><main class="w"><small>FOUNDATION CONNECTIONS 02</small><h1>Deep Archive</h1><a href="https://htmlpreview.github.io/?https://github.com/MirrorCartographer/MirrorCartographer/blob/main/public/games/connections/index.html">Return to archive index</a><p>Recover three buried classifications.</p><div id="solved"></div><div class="grid" id="grid"></div><div class="msg" id="msg"></div><button class="ctrl" onclick="shuffle()">Reorder</button> <button class="ctrl" onclick="submitSet()">Classify</button></main><script>const groups=[{n:'Stored records',c:'#b8d8ee',w:['LOG','LEDGER','FILE','INDEX']},{n:'Ocean zones',c:'#9cc5a1',w:['SURFACE','TWILIGHT','MIDNIGHT','ABYSS']},{n:'Things with chapters',c:'#e8c07d',w:['BOOK','LIFE','HISTORY','CASE']}];let left=groups.flatMap(g=>g.w),sel=[];const G=grid,S=solved,M=msg;function render(){G.innerHTML='';left.forEach(w=>{let b=document.createElement('button');b.className='tile'+(sel.includes(w)?' sel':'');b.textContent=w;b.onclick=()=>{sel.includes(w)?sel=sel.filter(x=>x!==w):sel.length<4&&sel.push(w);render()};G.appendChild(b)})}function shuffle(){left.sort(()=>Math.random()-.5);render()}function submitSet(){if(sel.length!==4){M.textContent='Choose four records.';return}let g=groups.find(g=>sel.every(x=>g.w.includes(x)));if(!g){M.textContent='Classification rejected.';sel=[];render();return}left=left.filter(x=>!sel.includes(x));let d=document.createElement('div');d.className='solved';d.style.background=g.c;d.innerHTML=g.n+'<br><small>'+g.w.join(' · ')+'</small>';S.appendChild(d);sel=[];M.textContent=left.length?'Classification accepted.':'Archive restored.';render()}shuffle()</script>
