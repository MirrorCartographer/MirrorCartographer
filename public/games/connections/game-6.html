<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Neon Weather</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at 20% 10%,#662d91,#111 45%,#05050a);color:#fff;min-height:100vh;display:grid;place-items:center}.w{width:min(860px,95vw);padding:24px}h1{font-size:clamp(2.3rem,8vw,5rem);margin:.15rem 0;text-shadow:0 0 22px #ff4fd8}.hub{color:#7ffcff}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:22px 0}.tile{min-height:78px;border:1px solid #7ffcff;border-radius:14px;background:#0c1020;color:#fff;font-weight:900;padding:8px;box-shadow:inset 0 0 18px #7ffcff22;cursor:pointer}.tile.sel{background:#ff4fd8;color:#12061a;transform:scale(.96)}.solved{padding:14px;border-radius:14px;margin:8px 0;color:#071018;font-weight:900}.ctrl{padding:12px 18px;border-radius:999px;border:1px solid #7ffcff;background:#0c1020;color:#fff}.msg{min-height:28px}@media(max-width:600px){.tile{min-height:64px;font-size:.72rem}}</style><main class="w"><small>FOUNDATION CONNECTIONS 06 · 4×5</small><h1>Neon Weather</h1><a class="hub" href="https://htmlpreview.github.io/?https://github.com/MirrorCartographer/MirrorCartographer/blob/main/public/games/connections/index.html">All games</a><p>Find five groups of four.</p><div id="solved"></div><div class="grid" id="grid"></div><div class="msg" id="msg"></div><button class="ctrl" onclick="shuffle()">Shuffle</button> <button class="ctrl" onclick="submitSet()">Submit</button></main><script>const groups=[{n:'Cloud types',c:'#89cff0',w:['CIRRUS','CUMULUS','STRATUS','NIMBUS']},{n:'Storm sounds',c:'#f6bd60',w:['RUMBLE','CRACK','ROAR','BOOM']},{n:'Weather instruments',c:'#84dcc6',w:['RADAR','VANE','GAUGE','THERMOMETER']},{n:'Words after “sun”',c:'#ff99c8',w:['LIGHT','BEAM','BURN','FLOWER']},{n:'Can be “cold”',c:'#a9def9',w:['FRONT','SNAP','CASE','SHOULDER']}];let left=groups.flatMap(g=>g.w),sel=[];const G=document.querySelector('#grid'),S=document.querySelector('#solved'),M=document.querySelector('#msg');function render(){G.innerHTML='';left.forEach(w=>{const b=document.createElement('button');b.className='tile'+(sel.includes(w)?' sel':'');b.textContent=w;b.onclick=()=>{sel.includes(w)?sel=sel.filter(x=>x!==w):sel.length<4&&sel.push(w);render()};G.appendChild(b)})}function shuffle(){left.sort(()=>Math.random()-.5);render()}function submitSet(){if(sel.length!==4){M.textContent='Select exactly four.';return}const g=groups.find(g=>sel.every(x=>g.w.includes(x)));if(!g){M.textContent='That forecast does not hold.';sel=[];render();return}left=left.filter(x=>!sel.includes(x));const d=document.createElement('div');d.className='solved';d.style.background=g.c;d.innerHTML=g.n+'<br><small>'+g.w.join(' · ')+'</small>';S.appendChild(d);sel=[];M.textContent=left.length?'Correct. Keep reading the sky.':'Forecast complete.';render()}shuffle()</script>
