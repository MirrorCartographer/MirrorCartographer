<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Signal Garden</title><style>:root{--bg:#102019;--card:#e9f4df;--ink:#173323;--accent:#8be28b}*{box-sizing:border-box}body{margin:0;font-family:system-ui;background:radial-gradient(circle at top,#254b36,var(--bg));color:#fff;min-height:100vh;display:grid;place-items:center}.w{width:min(760px,94vw);padding:30px}a{color:#fff}.top{display:flex;justify-content:space-between;align-items:end}h1{margin:.2rem 0;font-size:clamp(2.2rem,7vw,4.8rem)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:24px 0}.tile{border:0;border-radius:16px;background:var(--card);color:var(--ink);font-weight:800;min-height:92px;padding:8px;cursor:pointer}.tile.sel{outline:5px solid var(--accent);transform:scale(.96)}.solved{padding:16px;border-radius:16px;margin:10px 0;color:#102019;font-weight:800}.actions{display:flex;gap:10px}button.ctrl{padding:12px 18px;border-radius:999px;border:1px solid #fff6;background:transparent;color:#fff}.msg{min-height:28px}@media(max-width:600px){.tile{min-height:74px;font-size:.78rem}}</style><main class="w"><div class="top"><div><small>FOUNDATION CONNECTIONS 01</small><h1>Signal Garden</h1></div><a href="https://htmlpreview.github.io/?https://github.com/MirrorCartographer/MirrorCartographer/blob/main/public/games/connections/index.html">All games</a></div><p>Find three groups of four related words.</p><div id="solved"></div><div class="grid" id="grid"></div><div class="msg" id="msg"></div><div class="actions"><button class="ctrl" onclick="shuffle()">Shuffle</button><button class="ctrl" onclick="submitSet()">Submit</button></div></main><script>const groups=[{n:'Parts of a plant',c:'#b8e986',w:['ROOT','STEM','LEAF','SEED']},{n:'Ways signals travel',c:'#8bd3dd',w:['WAVE','WIRE','LIGHT','PULSE']},{n:'Things that branch',c:'#f7c59f',w:['RIVER','TREE','ROAD','NERVE']}];let left=groups.flatMap(g=>g.w),sel=[];const G=document.querySelector('#grid'),S=document.querySelector('#solved'),M=document.querySelector('#msg');function render(){G.innerHTML='';left.forEach(w=>{let b=document.createElement('button');b.className='tile'+(sel.includes(w)?' sel':'');b.textContent=w;b.onclick=()=>{sel.includes(w)?sel=sel.filter(x=>x!==w):sel.length<4&&sel.push(w);render()};G.appendChild(b)})}function shuffle(){left.sort(()=>Math.random()-.5);render()}function submitSet(){if(sel.length!==4){M.textContent='Select exactly four.';return}let g=groups.find(g=>sel.every(x=>g.w.includes(x)));if(!g){M.textContent='Not the connection.';sel=[];render();return}left=left.filter(x=>!sel.includes(x));let d=document.createElement('div');d.className='solved';d.style.background=g.c;d.innerHTML=g.n+'<br><small>'+g.w.join(' · ')+'</small>';S.appendChild(d);sel=[];M.textContent=left.length?'Correct. Keep going.':'Garden complete.';render()}shuffle()</script>
