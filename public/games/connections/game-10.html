<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Quiet Labyrinth</title><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,sans-serif;background:#e8ece7;color:#1b2520;min-height:100vh;display:grid;place-items:center}.w{width:min(860px,95vw);padding:24px}h1{font-size:clamp(2.3rem,8vw,5rem);margin:.15rem 0;letter-spacing:-.05em}.hub{color:#345b4a}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:22px 0}.tile{min-height:78px;border:1px solid #7b8d84;background:#f7faf7;color:#1b2520;font-weight:750;padding:8px;cursor:pointer}.tile:nth-child(odd){border-radius:22px 4px}.tile:nth-child(even){border-radius:4px 22px}.tile.sel{background:#324a3f;color:#fff;transform:scale(.96)}.solved{padding:14px;margin:8px 0;border:1px solid #61756a;font-weight:800}.ctrl{padding:12px 18px;border:1px solid #324a3f;background:transparent;color:#1b2520}.msg{min-height:28px}@media(max-width:600px){.tile{min-height:64px;font-size:.7rem}}</style><main class="w"><small>FOUNDATION CONNECTIONS 10 · 4×5</small><h1>Quiet Labyrinth</h1><a class="hub" href="https://htmlpreview.github.io/?https://github.com/MirrorCartographer/MirrorCartographer/blob/main/public/games/connections/index.html">Return to the entrance</a><p>Find five hidden paths.</p><div id="solved"></div><div class="grid" id="grid"></div><div class="msg" id="msg"></div><button class="ctrl" onclick="shuffle()">Shift walls</button> <button class="ctrl" onclick="submitSet()">Open path</button></main><script>const groups=[{n:'Maze features',c:'#c8d5b9',w:['WALL','TURN','DEAD END','CENTER']},{n:'Ways to be quiet',c:'#dfe7d8',w:['HUSH','MUTE','STILL','SILENT']},{n:'Navigation aids',c:'#b7d3c6',w:['MAP','COMPASS','BEACON','TRAIL']},{n:'Can follow “secret”',c:'#e6d3b3',w:['DOOR','CODE','GARDEN','AGENT']},{n:'Things with passages',c:'#c7c9d9',w:['BOOK','CAVE','HOUSE','MUSIC']}];let left=groups.flatMap(g=>g.w),sel=[];const G=document.querySelector('#grid'),S=document.querySelector('#solved'),M=document.querySelector('#msg');function render(){G.innerHTML='';left.forEach(w=>{const b=document.createElement('button');b.className='tile'+(sel.includes(w)?' sel':'');b.textContent=w;b.onclick=()=>{sel.includes(w)?sel=sel.filter(x=>x!==w):sel.length<4&&sel.push(w);render()};G.appendChild(b)})}function shuffle(){left.sort(()=>Math.random()-.5);render()}function submitSet(){if(sel.length!==4){M.textContent='Choose exactly four paths.';return}const g=groups.find(g=>sel.every(x=>g.w.includes(x)));if(!g){M.textContent='That corridor closes.';sel=[];render();return}left=left.filter(x=>!sel.includes(x));const d=document.createElement('div');d.className='solved';d.style.background=g.c;d.innerHTML=g.n+'<br><small>'+g.w.join(' · ')+'</small>';S.appendChild(d);sel=[];M.textContent=left.length?'A passage opens.':'You reached the center.';render()}shuffle()</script>
