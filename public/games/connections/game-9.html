<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Electric Kitchen</title><style>*{box-sizing:border-box}body{margin:0;font-family:Verdana,sans-serif;background:linear-gradient(135deg,#ff5f6d,#ffc371);color:#2c1738;min-height:100vh;display:grid;place-items:center}.w{width:min(860px,95vw);padding:24px;background:#fff7e8;border-radius:28px;box-shadow:0 25px 70px #5b183f55}h1{font-size:clamp(2.3rem,8vw,5rem);margin:.15rem 0}.hub{color:#7b1e5a}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:22px 0}.tile{min-height:78px;border:0;border-radius:18px;background:#ffe7b3;color:#351d27;font-weight:900;padding:8px;box-shadow:0 5px 0 #d9864f;cursor:pointer}.tile.sel{background:#7ce0d3;transform:translateY(4px);box-shadow:0 1px 0 #398d82}.solved{padding:14px;border-radius:18px;margin:8px 0;color:#2b1720;font-weight:900}.ctrl{padding:12px 18px;border:0;border-radius:999px;background:#6a1b5d;color:#fff;font-weight:900}.msg{min-height:28px}@media(max-width:600px){.tile{min-height:64px;font-size:.7rem}}</style><main class="w"><small>FOUNDATION CONNECTIONS 09 · 4×5</small><h1>Electric Kitchen</h1><a class="hub" href="https://htmlpreview.github.io/?https://github.com/MirrorCartographer/MirrorCartographer/blob/main/public/games/connections/index.html">Back to menu</a><p>Plate five groups of four.</p><div id="solved"></div><div class="grid" id="grid"></div><div class="msg" id="msg"></div><button class="ctrl" onclick="shuffle()">TOSS</button> <button class="ctrl" onclick="submitSet()">SERVE</button></main><script>const groups=[{n:'Cooking methods',c:'#ffd166',w:['BAKE','FRY','STEAM','GRILL']},{n:'Kitchen tools',c:'#9bf6ff',w:['WHISK','TONGS','LADLE','GRATER']},{n:'Taste words',c:'#caffbf',w:['SWEET','SALTY','BITTER','SOUR']},{n:'Can follow “pan”',c:'#ffadad',w:['CAKE','HANDLE','PIPE','FLUTE']},{n:'Things you slice',c:'#bdb2ff',w:['BREAD','LEMON','PIZZA','TIME']}];let left=groups.flatMap(g=>g.w),sel=[];const G=document.querySelector('#grid'),S=document.querySelector('#solved'),M=document.querySelector('#msg');function render(){G.innerHTML='';left.forEach(w=>{const b=document.createElement('button');b.className='tile'+(sel.includes(w)?' sel':'');b.textContent=w;b.onclick=()=>{sel.includes(w)?sel=sel.filter(x=>x!==w):sel.length<4&&sel.push(w);render()};G.appendChild(b)})}function shuffle(){left.sort(()=>Math.random()-.5);render()}function submitSet(){if(sel.length!==4){M.textContent='The plate needs four.';return}const g=groups.find(g=>sel.every(x=>g.w.includes(x)));if(!g){M.textContent='Those flavors do not combine.';sel=[];render();return}left=left.filter(x=>!sel.includes(x));const d=document.createElement('div');d.className='solved';d.style.background=g.c;d.innerHTML=g.n+'<br><small>'+g.w.join(' · ')+'</small>';S.appendChild(d);sel=[];M.textContent=left.length?'Perfect course. Continue.':'Kitchen complete.';render()}shuffle()</script>
