<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Paper Kingdom</title><style>*{box-sizing:border-box}body{margin:0;font-family:'Courier New',monospace;background:#d9c7a1;color:#2d2419;min-height:100vh;display:grid;place-items:center;background-image:linear-gradient(#0000 31px,#5d463322 32px),linear-gradient(90deg,#0000 31px,#5d463322 32px);background-size:32px 32px}.w{width:min(860px,95vw);padding:24px;background:#f5ead4;border:2px solid #2d2419;box-shadow:10px 10px 0 #2d2419}h1{font-size:clamp(2.3rem,8vw,5rem);margin:.15rem 0;text-transform:uppercase}.hub{color:#5c3c18}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:22px 0}.tile{min-height:78px;border:2px dashed #2d2419;background:#fffaf0;color:#2d2419;font-weight:900;padding:8px;cursor:pointer}.tile.sel{background:#f3c969;transform:rotate(-1deg)}.solved{padding:14px;margin:8px 0;border:2px solid #2d2419;font-weight:900}.ctrl{padding:12px 18px;border:2px solid #2d2419;background:#fffaf0;color:#2d2419;font-weight:900;box-shadow:3px 3px 0 #2d2419}.msg{min-height:28px}@media(max-width:600px){.tile{min-height:64px;font-size:.72rem}}</style><main class="w"><small>FOUNDATION CONNECTIONS 08 · 4×5</small><h1>Paper Kingdom</h1><a class="hub" href="https://htmlpreview.github.io/?https://github.com/MirrorCartographer/MirrorCartographer/blob/main/public/games/connections/index.html">Fold back to hub</a><p>Sort five royal houses.</p><div id="solved"></div><div class="grid" id="grid"></div><div class="msg" id="msg"></div><button class="ctrl" onclick="shuffle()">RESHUFFLE</button> <button class="ctrl" onclick="submitSet()">DECLARE</button></main><script>const groups=[{n:'Royal titles',c:'#f4d35e',w:['KING','QUEEN','PRINCE','DUKE']},{n:'Castle features',c:'#c8d5b9',w:['MOAT','TOWER','GATE','KEEP']},{n:'Paper forms',c:'#a9d6e5',w:['CARD','SCROLL','MAP','LETTER']},{n:'Can follow “court”',c:'#f7c59f',w:['ROOM','YARD','SHIP','CASE']},{n:'Things with crowns',c:'#d8bfd8',w:['TOOTH','TREE','HAT','JEWEL']}];let left=groups.flatMap(g=>g.w),sel=[];const G=document.querySelector('#grid'),S=document.querySelector('#solved'),M=document.querySelector('#msg');function render(){G.innerHTML='';left.forEach(w=>{const b=document.createElement('button');b.className='tile'+(sel.includes(w)?' sel':'');b.textContent=w;b.onclick=()=>{sel.includes(w)?sel=sel.filter(x=>x!==w):sel.length<4&&sel.push(w);render()};G.appendChild(b)})}function shuffle(){left.sort(()=>Math.random()-.5);render()}function submitSet(){if(sel.length!==4){M.textContent='Choose four subjects.';return}const g=groups.find(g=>sel.every(x=>g.w.includes(x)));if(!g){M.textContent='That house has no claim.';sel=[];render();return}left=left.filter(x=>!sel.includes(x));const d=document.createElement('div');d.className='solved';d.style.background=g.c;d.innerHTML=g.n+'<br><small>'+g.w.join(' · ')+'</small>';S.appendChild(d);sel=[];M.textContent=left.length?'House recognized.':'The kingdom is united.';render()}shuffle()</script>
