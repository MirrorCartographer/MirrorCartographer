<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Velvet Cosmos</title><style>*{box-sizing:border-box}body{margin:0;font-family:Georgia,serif;background:radial-gradient(circle at top,#321e4f,#100b1d 55%,#050308);color:#f7ecff;min-height:100vh;display:grid;place-items:center}.w{width:min(860px,95vw);padding:24px}h1{font-size:clamp(2.3rem,8vw,5rem);margin:.15rem 0;font-style:italic}.hub{color:#e9c8ff}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:22px 0}.tile{min-height:78px;border:1px solid #c9a4ff55;border-radius:20px;background:linear-gradient(145deg,#241432,#140b20);color:#fff;font-weight:700;padding:8px;box-shadow:0 8px 24px #0008;cursor:pointer}.tile.sel{background:#e9c8ff;color:#241432;transform:translateY(-3px)}.solved{padding:14px;border-radius:20px;margin:8px 0;color:#171020;font-weight:700}.ctrl{padding:12px 18px;border-radius:12px;border:1px solid #e9c8ff;background:transparent;color:#fff}.msg{min-height:28px}@media(max-width:600px){.tile{min-height:64px;font-size:.72rem}}</style><main class="w"><small>FOUNDATION CONNECTIONS 07 · 4×5</small><h1>Velvet Cosmos</h1><a class="hub" href="https://htmlpreview.github.io/?https://github.com/MirrorCartographer/MirrorCartographer/blob/main/public/games/connections/index.html">Return to the constellation map</a><p>Resolve five celestial families.</p><div id="solved"></div><div class="grid" id="grid"></div><div class="msg" id="msg"></div><button class="ctrl" onclick="shuffle()">Reorbit</button> <button class="ctrl" onclick="submitSet()">Align</button></main><script>const groups=[{n:'Planets',c:'#d8c4f1',w:['MARS','VENUS','SATURN','MERCURY']},{n:'Moon phases',c:'#cde7f0',w:['NEW','FULL','WAXING','WANING']},{n:'Space vehicles',c:'#f7d6bf',w:['ROCKET','SHUTTLE','PROBE','LANDER']},{n:'Can follow “star”',c:'#f6b8d0',w:['LIGHT','FISH','DUST','BOARD']},{n:'Constellation figures',c:'#c8e6c9',w:['HUNTER','LION','TWINS','DRAGON']}];let left=groups.flatMap(g=>g.w),sel=[];const G=document.querySelector('#grid'),S=document.querySelector('#solved'),M=document.querySelector('#msg');function render(){G.innerHTML='';left.forEach(w=>{const b=document.createElement('button');b.className='tile'+(sel.includes(w)?' sel':'');b.textContent=w;b.onclick=()=>{sel.includes(w)?sel=sel.filter(x=>x!==w):sel.length<4&&sel.push(w);render()};G.appendChild(b)})}function shuffle(){left.sort(()=>Math.random()-.5);render()}function submitSet(){if(sel.length!==4){M.textContent='Choose four lights.';return}const g=groups.find(g=>sel.every(x=>g.w.includes(x)));if(!g){M.textContent='The stars do not align.';sel=[];render();return}left=left.filter(x=>!sel.includes(x));const d=document.createElement('div');d.className='solved';d.style.background=g.c;d.innerHTML=g.n+'<br><small>'+g.w.join(' · ')+'</small>';S.appendChild(d);sel=[];M.textContent=left.length?'A constellation appears.':'The whole sky is mapped.';render()}shuffle()</script>
