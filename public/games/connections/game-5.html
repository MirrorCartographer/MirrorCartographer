<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mirror Rooms</title><style>*{box-sizing:border-box}body{margin:0;font-family:Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#eee,#777 45%,#111 46%,#ddd);color:#111;min-height:100vh;display:grid;place-items:center}.w{width:min(760px,94vw);padding:30px;background:#ffffffd9;backdrop-filter:blur(10px);border:1px solid #fff;box-shadow:0 20px 80px #0008}a{color:#111}h1{font-size:clamp(2.2rem,7vw,4.8rem);margin:.2rem 0;letter-spacing:-.06em}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:24px 0}.tile{border:1px solid #888;background:linear-gradient(145deg,#fff,#bbb);color:#111;font-weight:800;min-height:92px;padding:8px;cursor:pointer}.tile.sel{background:#111;color:#fff;transform:scaleX(-1)}.solved{padding:16px;margin:10px 0;border:1px solid #444;font-weight:800}.ctrl{padding:12px 18px;border:1px solid #111;background:#fff;color:#111}.msg{min-height:28px}@media(max-width:600px){.tile{min-height:74px;font-size:.75rem}}</style><main class="w"><small>FOUNDATION CONNECTIONS 05</small><h1>Mirror Rooms</h1><a href="https://htmlpreview.github.io/?https://github.com/MirrorCartographer/MirrorCartographer/blob/main/public/games/connections/index.html">Back through the glass</a><p>Find what reflects, reverses, or repeats.</p><div id="solved"></div><div class="grid" id="grid"></div><div class="msg" id="msg"></div><button class="ctrl" onclick="shuffle()">REFRACT</button> <button class="ctrl" onclick="submitSet()">ALIGN</button></main><script>const groups=[{n:'Reflective surfaces',c:'#d9edf7',w:['MIRROR','WATER','GLASS','METAL']},{n:'Things that repeat',c:'#ddd0f2',w:['ECHO','LOOP','REFRAIN','PATTERN']},{n:'Can be inverted',c:'#f3d6c6',w:['IMAGE','COLOR','ORDER','MEANING']}];let left=groups.flatMap(g=>g.w),sel=[];const G=grid,S=solved,M=msg;function render(){G.innerHTML='';left.forEach(w=>{let b=document.createElement('button');b.className='tile'+(sel.includes(w)?' sel':'');b.textContent=w;b.onclick=()=>{sel.includes(w)?sel=sel.filter(x=>x!==w):sel.length<4&&sel.push(w);render()};G.appendChild(b)})}function shuffle(){left.sort(()=>Math.random()-.5);render()}function submitSet(){if(sel.length!==4){M.textContent='Four reflections are required.';return}let g=groups.find(g=>sel.every(x=>g.w.includes(x)));if(!g){M.textContent='The reflections do not align.';sel=[];render();return}left=left.filter(x=>!sel.includes(x));let d=document.createElement('div');d.className='solved';d.style.background=g.c;d.innerHTML=g.n+'<br><small>'+g.w.join(' · ')+'</small>';S.appendChild(d);sel=[];M.textContent=left.length?'Alignment found.':'All rooms aligned.';render()}shuffle()</script>
