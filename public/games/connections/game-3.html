<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Machine Dream</title><style>*{box-sizing:border-box}body{margin:0;font-family:ui-monospace,monospace;background:#050505;color:#39ff88;min-height:100vh;display:grid;place-items:center}.w{width:min(760px,94vw);padding:30px;border:1px solid #39ff8840;box-shadow:0 0 60px #39ff8818}a{color:#39ff88}h1{font-size:clamp(2.2rem,7vw,4.8rem);margin:.2rem 0;text-shadow:0 0 20px #39ff88}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:24px 0}.tile{border:1px solid #39ff8870;background:#0d1711;color:#baffd4;font-weight:800;min-height:92px;padding:8px;cursor:pointer}.tile.sel{background:#39ff88;color:#031107}.solved{padding:16px;margin:8px 0;color:#000;font-weight:900}.ctrl{padding:12px 18px;border:1px solid #39ff88;background:#07110b;color:#39ff88}.msg{min-height:28px}@media(max-width:600px){.tile{min-height:74px;font-size:.75rem}}</style><main class="w"><small>NODE / CONNECTIONS / 03</small><h1>MACHINE DREAM</h1><a href="https://htmlpreview.github.io/?https://github.com/MirrorCartographer/MirrorCartographer/blob/main/public/games/connections/index.html">../hub</a><p>Resolve three semantic clusters.</p><div id="solved"></div><div class="grid" id="grid"></div><div class="msg" id="msg"></div><button class="ctrl" onclick="shuffle()">RANDOMIZE</button> <button class="ctrl" onclick="submitSet()">EXECUTE</button></main><script>const groups=[{n:'Computer memory',c:'#75f0ae',w:['CACHE','RAM','BUFFER','STACK']},{n:'Dream states',c:'#91a7ff',w:['LUCID','REM','TRANCE','REVERIE']},{n:'Can be neural',c:'#ffd166',w:['NET','PATH','LINK','SIGNAL']}];let left=groups.flatMap(g=>g.w),sel=[];const G=grid,S=solved,M=msg;function render(){G.innerHTML='';left.forEach(w=>{let b=document.createElement('button');b.className='tile'+(sel.includes(w)?' sel':'');b.textContent=w;b.onclick=()=>{sel.includes(w)?sel=sel.filter(x=>x!==w):sel.length<4&&sel.push(w);render()};G.appendChild(b)})}function shuffle(){left.sort(()=>Math.random()-.5);render()}function submitSet(){if(sel.length!==4){M.textContent='ERROR: SELECT 4';return}let g=groups.find(g=>sel.every(x=>g.w.includes(x)));if(!g){M.textContent='NO MATCH';sel=[];render();return}left=left.filter(x=>!sel.includes(x));let d=document.createElement('div');d.className='solved';d.style.background=g.c;d.innerHTML=g.n+'<br><small>'+g.w.join(' / ')+'</small>';S.appendChild(d);sel=[];M.textContent=left.length?'MATCH STORED':'SYSTEM COHERENT';render()}shuffle()</script>
