<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#111017" />
<title>Foundation Narrative Harmonic Room</title>
<style>
:root{font-family:Inter,ui-sans-serif,system-ui,sans-serif;color:#f7f4ec;background:#111017;color-scheme:dark;--line:#494353;--muted:#bcb3c8;--accent:#f0c86a}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 10%,#262032 0,#111017 55%);padding:clamp(14px,3vw,30px)}button{font:inherit;color:inherit;background:#262130;border:1px solid #625970;border-radius:14px;padding:.8rem 1rem;min-height:44px;cursor:pointer}button:hover{border-color:#f0c86a}button:focus-visible{outline:3px solid #f0c86a;outline-offset:3px}.shell{max-width:980px;margin:auto}.top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}.badge{font-size:.75rem;letter-spacing:.13em;text-transform:uppercase;color:#f0c86a}.room{margin-top:20px;border:1px solid var(--line);border-radius:28px;background:linear-gradient(145deg,#1c1824,#15131b);padding:clamp(18px,4vw,36px);min-height:470px;display:grid;grid-template-rows:auto 1fr auto;gap:22px;box-shadow:0 28px 70px #0008}.room h1{font-size:clamp(2rem,8vw,5rem);line-height:.9;margin:.2rem 0}.room p{color:var(--muted);max-width:58ch}.sigil{width:min(48vw,220px);aspect-ratio:1;border:2px solid #8f7fa1;border-radius:50%;margin:auto;display:grid;place-items:center;position:relative}.sigil:before,.sigil:after{content:"";position:absolute;background:#8f7fa1}.sigil:before{width:70%;height:1px}.sigil:after{height:70%;width:1px}.pulse{width:24%;aspect-ratio:1;border-radius:50%;background:var(--accent);box-shadow:0 0 35px #f0c86a88}.doors{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.door{text-align:left}.door strong{display:block}.door small{display:block;color:var(--muted);margin-top:5px}.controls,.memory{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.status{min-height:1.5em;color:#f0c86a}.path{margin-top:16px;padding:14px;border:1px solid var(--line);border-radius:16px;color:var(--muted);overflow-wrap:anywhere}.secondary{background:transparent}.danger{border-color:#8c5151}@media(max-width:700px){.doors{grid-template-columns:1fr}.room{min-height:unset}.sigil{width:160px}}@media(prefers-reduced-motion:no-preference){.pulse{animation:breathe 3.6s ease-in-out infinite}@keyframes breathe{50%{transform:scale(1.28);filter:brightness(1.2)}}}@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important}.pulse{animation:none}}
</style>
</head>
<body>
<main class="shell">
<div class="top"><div><div class="badge">Foundation Composition Field 05</div><h2>Narrative Harmonic Room</h2></div><button id="wake">Wake sound</button></div>
<section class="room" aria-labelledby="roomTitle"><div><div class="badge" id="roomIndex">Room 1</div><h1 id="roomTitle">Threshold</h1><p id="roomText">A room begins as a choice held open.</p></div><div class="sigil" aria-hidden="true"><div class="pulse"></div></div><div><div class="doors" id="doors"></div><p id="status" class="status" role="status" aria-live="polite"></p></div></section>
<div class="controls"><button id="play">Play path</button><button id="undo" class="secondary">Undo doorway</button><button id="reset" class="secondary">Reset room</button></div>
<div class="path" id="path" aria-label="Current narrative path"></div>
<div class="memory"><button id="export">Export approved evidence</button><button id="erase" class="danger">Erase local evidence</button></div>
</main>
<script>
(()=>{'use strict';
const ROOMS={threshold:{title:'Threshold',text:'A room begins as a choice held open.',root:220,doors:[['ember','Follow warmth','major third'],['mirror','Follow reflection','suspended fourth'],['hollow','Follow distance','minor second']]},ember:{title:'Ember Hall',text:'Small lights wait for a rhythm.',root:277.18,doors:[['canopy','Raise the sparks','perfect fifth'],['mirror','Fold them inward','minor third'],['threshold','Return with heat','unison']]},mirror:{title:'Mirror Chamber',text:'Every phrase returns altered by attention.',root:329.63,doors:[['hollow','Let the echo thin','minor sixth'],['canopy','Turn reflection upward','major sixth'],['threshold','Break the loop','perfect fourth']]},hollow:{title:'Hollow Archive',text:'The silence keeps shape without keeping identity.',root:185,doors:[['mirror','Ask the walls','tritone'],['ember','Carry one coal','major second'],['threshold','Leave no trace','octave']]},canopy:{title:'Canopy Room',text:'Branches divide one tone into many possible futures.',root:392,doors:[['ember','Descend glowing','minor seventh'],['hollow','Enter shadow','minor third'],['threshold','Close the circle','perfect fifth']]}};
const KEY='fia-narrative-room-state-v1',EKEY='fia-narrative-room-evidence-v1';const ALLOWED=new Set(['audio_consent','doorway_chosen','path_played','path_undone','room_reset','evidence_exported','evidence_erased','error','accessibility_mode']);const state=load(KEY,{room:'threshold',path:['threshold'],audio:false});let ctx=null,playing=[];
function load(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function bucket(n){return n<=1?'1':n<=3?'2-3':n<=6?'4-6':'7+'}
function record(type,data={}){if(!ALLOWED.has(type))return false;const allowed=['room','from_room','to_room','door_index','interval','path_length_band','duration_bucket','audio_state','mode','error_code'];const clean={schema:'fia.interaction.delta/1',feature:'narrative_harmonic_room',type,at_bucket:new Date().toISOString().slice(0,13)};for(const k of allowed)if(data[k]!==undefined)clean[k]=data[k];const ledger=load(EKEY,[]);ledger.push(clean);localStorage.setItem(EKEY,JSON.stringify(ledger.slice(-180)));return true}
const title=document.querySelector('#roomTitle'),text=document.querySelector('#roomText'),idx=document.querySelector('#roomIndex'),doors=document.querySelector('#doors'),status=document.querySelector('#status'),pathEl=document.querySelector('#path');
function render(){const r=ROOMS[state.room];title.textContent=r.title;text.textContent=r.text;idx.textContent='Room '+state.path.length;doors.innerHTML='';r.doors.forEach((d,i)=>{const b=document.createElement('button');b.className='door';b.innerHTML='<strong>'+d[1]+'</strong><small>'+d[2]+'</small>';b.addEventListener('click',()=>choose(i));doors.appendChild(b)});pathEl.textContent='Path: '+state.path.map(x=>ROOMS[x].title).join(' → ');document.querySelector('#wake').textContent=state.audio?'Sound awake':'Wake sound'}
async function wake(){try{ctx=ctx||new(window.AudioContext||window.webkitAudioContext)();await ctx.resume();state.audio=true;save();record('audio_consent',{audio_state:'granted'});status.textContent='Sound is awake. No audio will play without another action.';render()}catch{record('error',{error_code:'audio_unavailable'});status.textContent='Audio is unavailable; the room remains fully navigable.'}}
function tone(freq,when,dur=.28,pan=0){if(!ctx||!state.audio)return;const o=ctx.createOscillator(),g=ctx.createGain(),p=ctx.createStereoPanner?ctx.createStereoPanner():null;o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(.0001,when);g.gain.exponentialRampToValueAtTime(.12,when+.02);g.gain.exponentialRampToValueAtTime(.0001,when+dur);if(p){p.pan.value=pan;o.connect(g).connect(p).connect(ctx.destination)}else{o.connect(g).connect(ctx.destination)}o.start(when);o.stop(when+dur+.03);playing.push(o)}
function choose(i){const from=state.room,d=ROOMS[from].doors[i];state.room=d[0];state.path.push(d[0]);save();record('doorway_chosen',{from_room:from,to_room:d[0],door_index:i,interval:d[2],path_length_band:bucket(state.path.length)});status.textContent='Entered '+ROOMS[d[0]].title+'.';if(ctx&&state.audio)tone(ROOMS[d[0]].root,ctx.currentTime);render()}
function stop(){playing.forEach(o=>{try{o.stop()}catch{}});playing=[]}function play(){if(!state.audio){status.textContent='Wake sound first. The room never autoplays.';return}stop();const start=ctx.currentTime+.05;state.path.forEach((id,i)=>tone(ROOMS[id].root,start+i*.38,.32,(i/Math.max(1,state.path.length-1))*1.4-.7));record('path_played',{path_length_band:bucket(state.path.length),duration_bucket:state.path.length<=3?'brief':state.path.length<=6?'medium':'long'});status.textContent='Playing the path as a harmonic sentence.'}
function undo(){if(state.path.length<2){status.textContent='Nothing to undo.';return}state.path.pop();state.room=state.path.at(-1);save();record('path_undone',{room:state.room,path_length_band:bucket(state.path.length)});render();status.textContent='Last doorway reversed.'}function reset(){stop();state.room='threshold';state.path=['threshold'];save();record('room_reset',{room:'threshold'});render();status.textContent='Returned to the threshold.'}
function exportEvidence(){const payload={schema:'fia.reader.interaction-evidence/1',feature:'narrative_harmonic_room',privacy:{local_only:true,raw_text:false,identity:false,microphone:false},events:load(EKEY,[])};const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}));a.download='narrative-room-evidence.json';a.click();URL.revokeObjectURL(a.href);record('evidence_exported');status.textContent='Approved local evidence exported.'}function erase(){localStorage.removeItem(EKEY);status.textContent='Local interaction evidence erased.'}
document.querySelector('#wake').onclick=wake;document.querySelector('#play').onclick=play;document.querySelector('#undo').onclick=undo;document.querySelector('#reset').onclick=reset;document.querySelector('#export').onclick=exportEvidence;document.querySelector('#erase').onclick=erase;if(matchMedia('(prefers-reduced-motion: reduce)').matches)record('accessibility_mode',{mode:'reduced_motion'});render();})();
</script>
</body>
</html>
