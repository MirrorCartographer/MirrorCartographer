<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>ONE — Foundation World</title><style>
:root{color-scheme:dark}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05050a;font-family:Inter,ui-sans-serif,system-ui;color:#fff}canvas{position:fixed;inset:0;width:100%;height:100%;touch-action:none}.hud{position:fixed;inset:0;pointer-events:none}.top{position:absolute;top:20px;left:22px;right:22px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px}.brand{letter-spacing:.28em;font-size:11px;text-transform:uppercase;opacity:.75}.title{font:500 clamp(26px,5vw,70px)/.92 Georgia,serif;max-width:10ch;margin-top:8px;text-shadow:0 3px 24px #000}.desc{max-width:35ch;font-size:13px;line-height:1.5;opacity:.7;text-align:right}.bottom{position:absolute;left:22px;right:22px;bottom:18px}.track{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}.seg{height:3px;background:#ffffff20;position:relative;overflow:hidden}.seg i{position:absolute;inset:0;transform:scaleX(0);transform-origin:left;background:#fff;transition:.35s}.labels{display:flex;justify-content:space-between;margin-top:9px;font-size:9px;letter-spacing:.12em;opacity:.5}.hint{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;transition:.6s;pointer-events:auto}.hint button{appearance:none;border:1px solid #ffffff55;color:white;background:#090914bb;border-radius:99px;padding:14px 22px;letter-spacing:.18em;text-transform:uppercase;font-size:11px;backdrop-filter:blur(12px);cursor:pointer}.hint p{font-size:11px;opacity:.6}.nav{pointer-events:auto;position:absolute;right:20px;top:50%;transform:translateY(-50%);display:grid;gap:7px}.nav button{width:9px;height:9px;border-radius:50%;border:1px solid #fff8;background:transparent;padding:0;cursor:pointer}.nav button.on{background:white;box-shadow:0 0 14px white}.mute{pointer-events:auto;position:absolute;right:21px;bottom:52px;border:0;background:none;color:#fff;opacity:.55;cursor:pointer;font-size:18px}@media(max-width:650px){.desc{display:none}.labels{display:none}.nav{right:12px}.top{top:15px;left:16px}.bottom{left:16px;right:16px}.title{font-size:36px}}
</style></head><body><canvas id="c"></canvas><div class="hud"><div class="top"><div><div class="brand">Foundation Intelligence · ONE</div><div class="title" id="title">The Observatory</div></div><div class="desc" id="desc">Ideas wake as constellations. Move to bend their gravity.</div></div><div class="nav" id="nav"></div><button class="mute" id="mute">♪</button><div class="bottom"><div class="track" id="track"></div><div class="labels"><span>OBSERVE</span><span>GROW</span><span>RESONATE</span><span>PLAY</span><span>DIVE</span><span>DRAW</span><span>DREAM</span><span>SIGNAL</span><span>DISORIENT</span><span>COMPOSE</span></div></div><div class="hint" id="hint"><button id="enter">ENTER THE WORLD</button><p>drag · scroll · arrows · touch</p></div></div>
<script>
const C=document.getElementById('c'),x=C.getContext('2d');let W,H,D=Math.min(devicePixelRatio,2),t=0,target=0,pos=0,px=.5,py=.5,down=false,lastY=0,entered=false,audio=null,master=null,muted=false;
const worlds=[
['The Observatory','Ideas wake as constellations. Move to bend their gravity.',['#050716','#172653','#8eeaff']],
['Machine Garden','Metal remembers how to grow. Touch the seeds.',['#08120d','#194c38','#baf59b']],
['Echo Cathedral','Architecture emerges from resonance.',['#100811','#49193f','#ffb5ed']],
['Carnival of Thought','Reason loosens its tie and gets on the ride.',['#160708','#7a192d','#ffd36b']],
['The Ocean','Forgotten concepts drift below the light.',['#02131d','#064869','#63e3ff']],
['Living Blueprint','The sketch draws the machine drawing the city.',['#07121a','#143c58','#f5d77a']],
['Dream Library','Open a book; become the room inside it.',['#100b17','#43295c','#d9b7ff']],
['Signal Forest','Wind carries messages through luminous leaves.',['#06110d','#18462f','#83ffc3']],
['Impossible Museum','Perspective is an unreliable curator.',['#11100f','#4d463e','#fff2d3']],
['The Composer','Movement becomes rhythm; geometry becomes song.',['#080713','#33205f','#9bf7ff']]
];
function resize(){W=innerWidth;H=innerHeight;C.width=W*D;C.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',resize);resize();
const nav=document.getElementById('nav'),track=document.getElementById('track');worlds.forEach((w,i)=>{let b=document.createElement('button');b.onclick=()=>target=i;b.title=w[0];nav.append(b);let s=document.createElement('div');s.className='seg';s.innerHTML='<i></i>';track.append(s)});
function noise(n){return Math.sin(n*12.9898)*43758.5453%1}function lerp(a,b,n){return a+(b-a)*n}function hex(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}function mix(a,b,n){let A=hex(a),B=hex(b);return`rgb(${lerp(A[0],B[0],n)},${lerp(A[1],B[1],n)},${lerp(A[2],B[2],n)})`}
function bg(i,f){let j=Math.min(9,i+1),A=worlds[i][2],B=worlds[j][2],g=x.createRadialGradient(W*px,H*py,0,W/2,H/2,Math.max(W,H));g.addColorStop(0,mix(A[1],B[1],f));g.addColorStop(.55,mix(A[0],B[0],f));g.addColorStop(1,'#020205');x.fillStyle=g;x.fillRect(0,0,W,H)}
function stars(alpha){x.save();x.globalAlpha=alpha;for(let i=0;i<120;i++){let xx=(noise(i)*W+t*(i%3+1)*.4)%W,yy=noise(i+8)*H,r=1+Math.abs(noise(i+20))*2;x.fillStyle=i%13?'#bceaff':'#fff';x.beginPath();x.arc(xx,yy,r,0,7);x.fill();if(i%17===0){x.strokeStyle='#8eeaff55';x.beginPath();x.moveTo(xx,yy);x.lineTo((xx+80+px*40)%W,(yy+50)%H);x.stroke()}}x.restore()}
function garden(a){x.save();x.globalAlpha=a;for(let i=0;i<38;i++){let xx=(i/37)*W,base=H*.86,len=80+Math.abs(noise(i))*H*.45;x.strokeStyle=i%4?'#84d28a88':'#d7ffaa';x.lineWidth=1.2;x.beginPath();x.moveTo(xx,base);x.quadraticCurveTo(xx+Math.sin(t*.01+i)*30,base-len/2,xx+Math.sin(t*.014+i)*50,base-len);x.stroke();x.fillStyle='#d3ffb5';x.beginPath();x.arc(xx+Math.sin(t*.014+i)*50,base-len,2+i%3,0,7);x.fill()}x.restore()}
function cathedral(a){x.save();x.globalAlpha=a;x.translate(W/2,H*.75);for(let k=0;k<8;k++){let r=70+k*55+Math.sin(t*.02+k)*12;x.strokeStyle=`rgba(255,190,238,${.55-k*.045})`;x.lineWidth=2;x.beginPath();x.arc(0,0,r,Math.PI,0);x.stroke();for(let q=-1;q<=1;q+=2){x.beginPath();x.moveTo(q*r,0);x.lineTo(q*r,-r*.9);x.stroke()}}x.restore()}
function carnival(a){x.save();x.globalAlpha=a;x.translate(W/2,H/2);for(let i=0;i<18;i++){let r=45+i*15,ang=t*.006*(i%2?1:-1)+i;x.strokeStyle=`hsla(${i*24+t*.05},90%,65%,.55)`;x.beginPath();x.arc(0,0,r,ang,ang+Math.PI*1.25);x.stroke();x.fillStyle='#ffd76a';x.beginPath();x.arc(Math.cos(ang)*r,Math.sin(ang)*r,5,0,7);x.fill()}x.restore()}
function ocean(a){x.save();x.globalAlpha=a;for(let y=0;y<H;y+=18){x.strokeStyle=`rgba(70,220,255,${.08+y/H*.12})`;x.beginPath();for(let xx=0;xx<W;xx+=12)x.lineTo(xx,y+Math.sin(xx*.018+t*.018+y)*7);x.stroke()}for(let i=0;i<16;i++){let xx=(noise(i)*W+t*(i%3+1)*.18)%W,yy=H*.2+noise(i+4)*H*.7;x.fillStyle='#a8f5ff99';x.beginPath();x.ellipse(xx,yy,18,5,Math.sin(t*.01+i),0,7);x.fill()}x.restore()}
function blueprint(a){x.save();x.globalAlpha=a;x.strokeStyle='#8ad8ff77';x.lineWidth=1;for(let i=0;i<14;i++){let xx=i*W/13;x.beginPath();x.moveTo(xx,0);x.lineTo(xx,H);x.stroke()}for(let i=0;i<10;i++){let yy=i*H/9;x.beginPath();x.moveTo(0,yy);x.lineTo(W,yy);x.stroke()}x.translate(W/2,H/2);x.rotate(Math.sin(t*.006)*.08);for(let i=0;i<7;i++){x.strokeRect(-220+i*28,-130+i*18,440-i*56,260-i*36)}x.restore()}
function library(a){x.save();x.globalAlpha=a;for(let i=0;i<24;i++){let z=(i+((t*.01)%1))/24,ww=30+z*160,hh=20+z*100,xx=W/2+(noise(i)-.5)*W*z,yy=H/2+(noise(i+3)-.5)*H*z;x.strokeStyle=`rgba(230,200,255,${.15+z*.65})`;x.strokeRect(xx-ww/2,yy-hh/2,ww,hh);x.beginPath();x.moveTo(xx,yy-hh/2);x.lineTo(xx,yy+hh/2);x.stroke()}x.restore()}
function forest(a){x.save();x.globalAlpha=a;for(let i=0;i<55;i++){let xx=noise(i)*W,yy=noise(i+2)*H,r=3+noise(i+3)*8;x.fillStyle=`rgba(120,255,190,${.25+.5*Math.abs(Math.sin(t*.025+i))})`;x.beginPath();x.arc(xx+Math.sin(t*.01+i)*20,yy,r,0,7);x.fill();if(i%5===0){x.strokeStyle='#72ffc355';x.beginPath();x.moveTo(xx,H);x.lineTo(xx+Math.sin(t*.01+i)*20,yy);x.stroke()}}x.restore()}
function museum(a){x.save();x.globalAlpha=a;x.translate(W/2,H/2);for(let i=0;i<11;i++){x.rotate(.16+Math.sin(t*.003+i)*.01);let s=60+i*35;x.strokeStyle=`rgba(255,245,215,${.55-i*.035})`;x.strokeRect(-s,-s*.55,s*2,s*1.1)}x.restore()}
function composer(a){x.save();x.globalAlpha=a;x.translate(W/2,H/2);for(let i=0;i<32;i++){let ang=i/32*Math.PI*2+t*.006,r=90+Math.sin(i*2.7+t*.015)*45;x.strokeStyle=`hsla(${185+i*7},90%,72%,.55)`;x.beginPath();x.moveTo(0,0);x.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);x.stroke();x.fillStyle='#d9ffff';x.beginPath();x.arc(Math.cos(ang)*r,Math.sin(ang)*r,2+(i%4),0,7);x.fill()}x.restore()}
const renderers=[stars,garden,cathedral,carnival,ocean,blueprint,library,forest,museum,composer];
function tone(n){if(!audio||muted)return;let o=audio.createOscillator(),g=audio.createGain();o.type=['sine','triangle','sine','square','sine','triangle','sine','sine','sawtooth','sine'][Math.round(pos)];o.frequency.value=110*Math.pow(2,n/12);g.gain.setValueAtTime(.0001,audio.currentTime);g.gain.exponentialRampToValueAtTime(.07,audio.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+.8);o.connect(g).connect(master);o.start();o.stop(audio.currentTime+.82)}
function enter(){entered=true;document.getElementById('hint').style.opacity=0;document.getElementById('hint').style.pointerEvents='none';audio=new(window.AudioContext||window.webkitAudioContext)();master=audio.createGain();master.gain.value=.35;master.connect(audio.destination);tone(0)}document.getElementById('enter').onclick=enter;
document.getElementById('mute').onclick=()=>{muted=!muted;document.getElementById('mute').textContent=muted?'×':'♪'};
function move(e){let q=e.touches?e.touches[0]:e;px=q.clientX/W;py=q.clientY/H;if(down){target=Math.max(0,Math.min(9,target+(lastY-q.clientY)/H*3));lastY=q.clientY}}
C.addEventListener('pointerdown',e=>{down=true;lastY=e.clientY;tone(Math.floor(px*12));});addEventListener('pointerup',()=>down=false);C.addEventListener('pointermove',move);C.addEventListener('touchmove',move,{passive:false});addEventListener('wheel',e=>{target=Math.max(0,Math.min(9,target+e.deltaY*.0018));},{passive:true});addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')target=Math.min(9,Math.round(target)+1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')target=Math.max(0,Math.round(target)-1)});
let last=-1;function frame(){t++;pos+=(target-pos)*.055;let i=Math.floor(pos),f=pos-i;bg(i,f);renderers[i](1-f);if(i<9)renderers[i+1](f);let current=Math.round(pos);if(current!==last){last=current;document.getElementById('title').textContent=worlds[current][0];document.getElementById('desc').textContent=worlds[current][1];tone([0,2,4,5,7,9,11,12,14,16][current])} [...nav.children].forEach((b,k)=>b.classList.toggle('on',k===current));[...track.children].forEach((s,k)=>s.firstChild.style.transform=`scaleX(${k<current?1:k===current?Math.max(.12,1-Math.abs(pos-current)):0})`);requestAnimationFrame(frame)}frame();
</script></body></html>
