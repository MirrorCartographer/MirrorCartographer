<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Generative Rebuild Chamber</title><style>*{box-sizing:border-box}html,body{margin:0;background:#05050b;color:#fff8ef;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}body{min-height:100vh;background:radial-gradient(circle at 20% 0%,rgba(255,226,191,.16),transparent 34%),radial-gradient(circle at 80% 18%,rgba(145,216,255,.13),transparent 38%),linear-gradient(135deg,#05050b,#09091a 48%,#03030a)}main{padding:18px}.hero{position:relative;min-height:72vh;border:1px solid rgba(255,255,255,.14);border-radius:34px;overflow:hidden;background:linear-gradient(125deg,rgba(255,226,191,.08),rgba(145,216,255,.06),rgba(196,181,253,.08));box-shadow:0 30px 120px rgba(0,0,0,.48)}.sky{position:absolute;inset:0}.sky i{position:absolute;border-radius:999px;background:rgba(255,248,239,.72);box-shadow:0 0 24px rgba(255,226,191,.55),0 0 80px rgba(145,216,255,.18);animation:float 12s ease-in-out infinite alternate}.spine{position:absolute;inset:8%;border:1px solid rgba(255,255,255,.09);border-radius:999px;transform:rotate(var(--tilt,-8deg));box-shadow:inset 0 0 80px rgba(255,255,255,.04),0 0 80px rgba(145,216,255,.18)}.card{position:absolute;border:1px solid rgba(255,255,255,.14);background:rgba(5,5,11,.54);backdrop-filter:blur(20px);border-radius:28px;padding:18px;box-shadow:0 20px 80px rgba(0,0,0,.35)}.primary{left:18px;right:18px;bottom:18px;max-width:760px}.grammar{right:18px;top:18px;max-width:310px;color:rgba(255,248,239,.68)}.kicker{margin:0 0 10px;text-transform:uppercase;letter-spacing:.22em;font-size:11px;color:rgba(255,226,191,.62)}h1{margin:0;font-family:Georgia,serif;font-size:clamp(44px,12vw,132px);line-height:.84;letter-spacing:-.09em;font-weight:500}.thesis{max-width:58ch;font-size:clamp(15px,3vw,22px);line-height:1.35;color:rgba(255,248,239,.76)}button,a{appearance:none;border:1px solid rgba(255,255,255,.18);border-radius:999px;background:rgba(255,248,239,.08);color:#fff8ef;padding:10px 14px;font:inherit;cursor:pointer;text-decoration:none}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:14px}.panel{min-height:260px;border:1px solid rgba(255,255,255,.12);border-radius:28px;background:rgba(255,255,255,.045);padding:18px}.panel h2{margin:0 0 14px;font-family:Georgia,serif;font-size:clamp(28px,6vw,72px);line-height:.9;letter-spacing:-.05em}.deadList,.cloud{display:flex;flex-wrap:wrap;gap:8px}.selected{margin-top:18px;color:rgba(255,248,239,.72);line-height:1.45}.selected strong{display:block;margin-top:8px;color:#ffe2bf}.cloud span{border:1px solid rgba(255,255,255,.11);border-radius:999px;padding:7px 9px;color:rgba(255,248,239,.62);font-size:12px}.history ol{display:grid;gap:10px;margin:0;padding:0;list-style:none}.history li{display:grid;gap:4px;border-left:1px solid rgba(255,226,191,.22);padding-left:12px}.history span{color:rgba(255,248,239,.56);font-size:12px;line-height:1.35}.status{font-size:11px;color:rgba(255,248,239,.48);margin-left:10px}@keyframes float{from{transform:translate3d(-12px,10px,0) scale(.86)}to{transform:translate3d(18px,-22px,0) scale(1.15)}}@media(max-width:860px){.hero{min-height:78vh}.grammar{display:none}.grid{grid-template-columns:1fr}.primary{left:12px;right:12px;bottom:12px}.panel{min-height:auto}}</style></head><body><main><section class="hero"><div class="sky" id="sky"></div><div class="spine" id="spine"></div><article class="card primary"><p class="kicker">public rebuild chamber</p><h1 id="title"></h1><p class="thesis" id="thesis"></p><button id="rebuild">rebuild now</button><span class="status" id="status">local until Cloudflare ingest is configured</span></article><article class="card grammar" id="grammar"></article></section><section class="grid"><article class="panel"><h2>dead ends</h2><div class="deadList" id="deadList"></div><div class="selected" id="selected"></div></article><article class="panel"><h2>32</h2><p>working abstractions in this public seed</p><div class="cloud" id="cloud"></div></article><article class="panel history"><h2>site rebuilding itself</h2><ol id="history"></ol></article></section></main><script>const deadEnds=[['beautiful wallpaper','a pleasant surface is not a reason to stay','narrative gravity'],['explaining the system','too many words turn the organism back into a brochure','felt proof'],['feature chasing','more parts do not create aliveness','fewer stronger loops'],['mystical overreach','symbolic resonance is not evidence','separate proof lanes'],['deployment theater','a commit is not a working site','runtime gates'],['tap as interaction','the tap is only permission; the real input is feeling','atmospheric response']];const abstractions=['user feels, not user taps','website as instrument','archive as landscape','memory as weather','tests as lie detector','GitHub as external nervous system','public doorway / private organism','dead ends as compost','meaning connects; evidence stays domain-specific','the site remembers how it became itself','not app, protocol','re-enchantment layer','living place, not page','future note as intention','past note as survival','first-reading engine','branch as alternate timeline','deployment as proof threshold'];const weather=['murmur','aurora','wind','dawn','rain','lightning','clear','cloud'];const organs=['atlas','heart','gate','thread','weather','mirror','mouth','comet','root','choir'];const motions=['spiral','drift','pulse','flicker','braid','tilt','bloom','collapse','orbit','return'];const layouts=['constellation','fault line','organ map','weather score','ritual console','broken arcade','field notebook'];let generation=1,selected=deadEnds[0],history=[];const session=(crypto.randomUUID?crypto.randomUUID():Date.now().toString(36));function rng(seed){return()=>{seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}function pick(a,r){return a[Math.floor(r()*a.length)%a.length]}function grammarFor(n){const r=rng(7309+n*97),a=pick(abstractions,r),b=pick(abstractions,r);return{seed:7309+n*97,title:`${pick(organs,r)} / ${pick(motions,r)} / ${pick(weather,r)}`,thesis:`${a} becomes ${b}`,weather:pick(weather,r),layout:pick(layouts,r),motion:pick(motions,r),organ:pick(organs,r),contradiction:`${pick(deadEnds,r)[0]} → ${pick(deadEnds,r)[2]}`,tilt:-14+r()*28}}async function record(eventType,g){try{const res=await fetch('/api/interactions',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({eventType,generation,grammar:g,selectedDeadEnd:{name:selected[0],lesson:selected[1],metabolizedInto:selected[2]},sessionId:session,path:'/generative',clientTime:new Date().toISOString()}),keepalive:true});if(res.ok)document.getElementById('status').textContent='interaction committed to GitHub'}catch{}}function render(eventType='render'){const g=grammarFor(generation);history=[g,...history].slice(0,9);document.getElementById('title').textContent=g.title;document.getElementById('thesis').textContent=g.thesis;document.getElementById('grammar').innerHTML=`<p>generation ${generation}</p><p>${g.layout}</p><p>${g.motion}</p><p>${g.organ}</p><p>${g.contradiction}</p>`;document.getElementById('spine').style.setProperty('--tilt',g.tilt+'deg');const sky=document.getElementById('sky'),r=rng(g.seed+404);sky.innerHTML='';for(let i=0;i<34;i++){const dot=document.createElement('i');dot.style.left=(8+r()*84)+'%';dot.style.top=(12+r()*76)+'%';const s=.45+r()*1.9;dot.style.width=dot.style.height=s+'rem';dot.style.opacity=.16+r()*.7;dot.style.animationDelay=r()*9+'s';sky.appendChild(dot)}document.getElementById('history').innerHTML=history.map(x=>`<li><b>${x.title}</b><span>${x.thesis}</span></li>`).join('');if(eventType!=='render')record(eventType,g)}document.getElementById('rebuild').onclick=()=>{generation++;render('manual-rebuild')};document.getElementById('deadList').innerHTML=deadEnds.map((d,i)=>`<button data-i="${i}">${d[0]}</button>`).join('');document.getElementById('deadList').onclick=e=>{if(e.target.dataset.i!==undefined){selected=deadEnds[+e.target.dataset.i];document.getElementById('selected').innerHTML=`<p>${selected[1]}</p><strong>${selected[2]}</strong>`;record('dead-end-selected',grammarFor(generation))}};document.getElementById('selected').innerHTML=`<p>${selected[1]}</p><strong>${selected[2]}</strong>`;document.getElementById('cloud').innerHTML=abstractions.map(a=>`<span>${a}</span>`).join('');render();setInterval(()=>{generation++;render('auto-rebuild')},9000)</script></body></html>
