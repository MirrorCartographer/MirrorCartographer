<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07140f">
<title>Pressure Garden</title>
<style>
:root{color-scheme:dark;--ink:#e9f0c7;--dim:#91a98d}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07140f;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}body{touch-action:none}canvas{position:fixed;inset:0;width:100%;height:100%}.ui{position:fixed;inset:0;padding:max(18px,env(safe-area-inset-top)) max(18px,env(safe-area-inset-right)) max(18px,env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-left));display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}header{max-width:31rem}small{letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}h1{font:400 clamp(2.6rem,10vw,7rem)/.8 Georgia,serif;margin:.35rem 0}p{line-height:1.45;color:var(--dim)}footer{display:flex;align-items:end;justify-content:space-between;gap:1rem}.controls{pointer-events:auto;display:flex;gap:.5rem;flex-wrap:wrap}button,a{border:1px solid rgba(233,240,199,.28);background:rgba(7,20,15,.62);color:var(--ink);padding:.72rem .9rem;border-radius:999px;text-decoration:none;font:600 .68rem/1 ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase;backdrop-filter:blur(10px)}button:disabled{opacity:.38;cursor:not-allowed}button:focus-visible,a:focus-visible{outline:2px solid var(--ink);outline-offset:3px}output{text-align:right;color:var(--dim);font-size:.72rem;max-width:18rem}@media(max-width:600px){footer{align-items:flex-start;flex-direction:column-reverse}output{text-align:left}}@media(prefers-reduced-motion:reduce){canvas{opacity:.82}}
</style>
</head>
<body>
<canvas id="garden" aria-hidden="true"></canvas>
<div class="ui"><header><small>room three · a finite ecology</small><h1>Pressure Garden</h1><p>Press to plant. Hold to deepen roots. Drag to bend every stem. After two plants exist, cross the newest pair: their visible traits recombine into a third organism. Nothing survives this visit.</p></header><footer><div class="controls"><button id="cross" type="button" disabled>cross newest</button><button id="clear" type="button">compost all</button><button id="still" type="button" aria-pressed="false">hold wind</button><a href="../index.html">return to bell</a></div><output id="status" aria-live="polite">soil waiting</output></footer></div>
<script type="module">
import{createGenome,crossGenomes,describeGenome}from'./ecology.mjs';
const c=document.querySelector('#garden'),x=c.getContext('2d'),status=document.querySelector('#status'),still=document.querySelector('#still'),cross=document.querySelector('#cross');let w,h,d=1,t=0,wind=true,down=false,born=0,p={x:.5,y:.5},plants=[];const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
function size(){d=Math.min(2,devicePixelRatio||1);w=innerWidth;h=innerHeight;c.width=w*d;c.height=h*d;x.setTransform(d,0,0,d,0,0)}addEventListener('resize',size);size();
function plant(px,py,age=0,genome=null,parents=[]){const pressure=Math.max(.05,age);const g=genome||createGenome({x:px,y:py,pressure});plants.push({x:px,y:py,age,lean:0,phase:(g.seed%700)/100,genome:g,parents});if(plants.length>34)plants.shift();cross.disabled=plants.length<2;status.textContent=`${plants.length} living · ${describeGenome(g)}${parents.length?' · hybrid':''}`}
function bloom(q,qh){const g=q.genome,petals=g.bloom,r=3+q.age*8;x.save();x.translate(q.lean,-qh);x.rotate(g.curl*.5);for(let i=0;i<petals;i++){x.rotate(Math.PI*2/petals);x.fillStyle=`hsla(${g.hue+28+i*2} 72% 78% / ${q.age*.72})`;x.beginPath();x.ellipse(r*1.25,0,r*.95,r*.38,0,0,Math.PI*2);x.fill()}x.fillStyle=`hsla(${g.hue-18} 70% 72% / ${q.age})`;x.beginPath();x.arc(0,0,r*.55,0,Math.PI*2);x.fill();x.restore()}
function drawRoots(q){const g=q.genome;x.strokeStyle=`hsla(${g.hue-22} 34% 42% / ${.16+q.age*.28})`;x.lineWidth=.6+g.root;for(let i=0;i<3;i++){const side=i-1;x.beginPath();x.moveTo(0,0);x.quadraticCurveTo(side*22*g.root,18+g.root*12,side*38*g.root,42+g.root*18);x.stroke()}}
function draw(now){t=reduce?0:now;x.fillStyle='#07140f';x.fillRect(0,0,w,h);const glow=x.createRadialGradient(p.x*w,p.y*h,0,p.x*w,p.y*h,Math.max(w,h)*.8);glow.addColorStop(0,'rgba(177,220,132,.09)');glow.addColorStop(1,'rgba(0,0,0,0)');x.fillStyle=glow;x.fillRect(0,0,w,h);for(const q of plants){const g=q.genome;q.age=Math.min(1,q.age+(reduce?.004:.0018));const dx=(p.x-q.x)*w,qh=(35+q.age*190)*g.height*(1-q.y*.28),sway=(wind&&!reduce?Math.sin(t*.001+q.phase)*12:0)+dx*.035*q.age+g.curl*10;q.lean+=(sway-q.lean)*.035;x.save();x.translate(q.x*w,q.y*h);drawRoots(q);x.strokeStyle=`hsla(${g.hue} 52% 68% / ${.3+q.age*.6})`;x.lineWidth=1+q.age*2;x.beginPath();x.moveTo(0,0);x.quadraticCurveTo(q.lean*.2,-qh*.45,q.lean,-qh);x.stroke();for(let i=1;i<=g.branches;i++){const k=i/(g.branches+1),yy=-qh*k,xx=q.lean*k,side=i%2?1:-1,len=(18+q.age*38)*(1-k*.35);x.beginPath();x.moveTo(xx,yy);x.quadraticCurveTo(xx+side*len*.5,yy-len*.22,xx+side*len,yy-len*.08);x.stroke()}bloom(q,qh);x.restore()}requestAnimationFrame(draw)}requestAnimationFrame(draw);
function loc(e){p.x=e.clientX/w;p.y=e.clientY/h}c.addEventListener('pointerdown',e=>{down=true;born=performance.now();loc(e);c.setPointerCapture(e.pointerId)});c.addEventListener('pointermove',e=>{loc(e);if(down&&performance.now()-born>500&&plants.length<34&&Math.random()<.08)plant(p.x,p.y,.15)});function up(e){loc(e);plant(p.x,p.y,Math.min(.75,(performance.now()-born)/2400));down=false}c.addEventListener('pointerup',up);c.addEventListener('pointercancel',()=>down=false);
cross.onclick=()=>{if(plants.length<2)return;const a=plants.at(-2),b=plants.at(-1),px=(a.x+b.x)/2,py=Math.min(.94,(a.y+b.y)/2+.035),g=crossGenomes(a.genome,b.genome,{x:px,y:py,pressure:(a.age+b.age)/2});plant(px,py,.28,g,[a.genome.seed,b.genome.seed])};document.querySelector('#clear').onclick=()=>{plants=[];cross.disabled=true;status.textContent='soil returned'};still.onclick=()=>{wind=!wind;still.setAttribute('aria-pressed',String(!wind));still.textContent=wind?'hold wind':'release wind';status.textContent=wind?'wind returned':'wind held'};document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();plant(.15+Math.random()*.7,.55+Math.random()*.35,.45)}if(e.key.toLowerCase()==='x'&&!cross.disabled)cross.click()});
</script>
</body></html>
