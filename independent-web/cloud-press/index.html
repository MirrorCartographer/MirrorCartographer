<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#d8d0bb">
<title>Cloud Press</title>
<style>
:root{--paper:#d8d0bb;--ink:#181713;--bruise:#4b5364;--red:#8b392d}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:var(--paper);color:var(--ink);font-family:Georgia,serif}body{touch-action:none}.shell{height:100svh;display:grid;grid-template-rows:auto 1fr auto;gap:12px;padding:max(16px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) max(16px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left))}.head,.foot{display:flex;justify-content:space-between;align-items:flex-end;gap:16px}.kicker,.status,.return,.clear{font:700 11px/1.3 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.12em;text-transform:uppercase}.title{font-size:clamp(34px,8vw,88px);line-height:.78;letter-spacing:-.055em;font-weight:400;margin:.18em 0 0}.instruction{max-width:33ch;font-style:italic;text-align:right}.press{position:relative;overflow:hidden;border:1px solid var(--ink);background:linear-gradient(145deg,#e5deca,#c8c0aa);box-shadow:inset 0 0 0 7px rgba(24,23,19,.04);touch-action:none}.press::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(97deg,transparent 0 13px,rgba(24,23,19,.025) 14px 15px);pointer-events:none}canvas{width:100%;height:100%;display:block}.gauge{position:absolute;left:12px;top:12px;width:10px;height:calc(100% - 24px);border:1px solid var(--ink);display:flex;align-items:flex-end}.gauge i{display:block;width:100%;height:0;background:var(--red);transition:height .08s linear}.actions{display:flex;gap:14px;align-items:center}.return,.clear{color:var(--ink);background:none;border:0;border-bottom:1px solid currentColor;padding:0 0 3px;text-decoration:none;cursor:pointer}.return:focus-visible,.clear:focus-visible,.press:focus-visible{outline:3px solid var(--red);outline-offset:4px}.status{text-align:right;max-width:30ch}@media(max-width:620px){.head{align-items:flex-start}.instruction{font-size:.88rem}.foot{align-items:flex-start}.status{font-size:10px}.title{font-size:clamp(38px,15vw,68px)}}@media(prefers-reduced-motion:reduce){.gauge i{transition:none}}
</style>
</head>
<body>
<main class="shell">
<header class="head"><div><div class="kicker">Room four · weather as pressure</div><h1 class="title">Cloud<br>Press</h1></div><div class="instruction">Hold the paper to load a cloud. Release to print its weight.</div></header>
<section class="press" id="press" tabindex="0" role="application" aria-label="Cloud printing instrument. Hold pointer or space to build pressure, then release to print a cloud."><canvas id="sheet" aria-hidden="true"></canvas><div class="gauge" aria-hidden="true"><i id="gauge"></i></div></section>
<footer class="foot"><div class="actions"><a class="return" href="../rain-organ/">Return to Rain Organ</a><button class="clear" id="clear" type="button">Fresh sheet</button></div><div class="status" id="status" aria-live="polite">sheet empty · pressure 0%</div></footer>
</main>
<script>
(()=>{const stage=document.querySelector('#press'),canvas=document.querySelector('#sheet'),ctx=canvas.getContext('2d'),gauge=document.querySelector('#gauge'),status=document.querySelector('#status'),clear=document.querySelector('#clear'),reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;let w=0,h=0,dpr=1,holding=false,pressure=0,last=performance.now(),prints=[],pointer={x:.5,y:.5};function resize(){const r=stage.getBoundingClientRect();w=r.width;h=r.height;dpr=Math.min(2,devicePixelRatio||1);canvas.width=Math.round(w*dpr);canvas.height=Math.round(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0)}new ResizeObserver(resize).observe(stage);resize();function locate(e){const r=stage.getBoundingClientRect();pointer.x=Math.max(.05,Math.min(.95,(e.clientX-r.left)/r.width));pointer.y=Math.max(.08,Math.min(.92,(e.clientY-r.top)/r.height))}function begin(e){holding=true;if(e)locate(e);stage.focus({preventScroll:true});announce()}function end(){if(!holding)return;holding=false;const p=Math.max(.08,pressure);prints.push({x:pointer.x,y:pointer.y,p,seed:prints.length+1});pressure=0;announce(`cloud ${prints.length} printed`)}function announce(prefix=''){gauge.style.height=`${Math.round(pressure*100)}%`;status.textContent=`${prefix?prefix+' · ':''}${prints.length?prints.length+' impression'+(prints.length===1?'':'s'):'sheet empty'} · pressure ${Math.round(pressure*100)}%`}stage.addEventListener('pointerdown',e=>{stage.setPointerCapture(e.pointerId);begin(e)});stage.addEventListener('pointermove',e=>{if(holding)locate(e)});stage.addEventListener('pointerup',end);stage.addEventListener('pointercancel',end);stage.addEventListener('keydown',e=>{if(e.code==='Space'&&!holding){e.preventDefault();begin()}});stage.addEventListener('keyup',e=>{if(e.code==='Space'){e.preventDefault();end()}});clear.addEventListener('click',()=>{prints=[];pressure=0;announce('fresh sheet')});function cloud(c){const x=c.x*w,y=c.y*h,r=18+c.p*92;ctx.save();ctx.translate(x,y);ctx.rotate((c.seed%7-3)*.035);ctx.globalCompositeOperation='multiply';for(let i=0;i<9;i++){const a=i*2.399+c.seed,rr=r*(.18+.11*(i%4)),ox=Math.cos(a)*r*.46,oy=Math.sin(a)*r*.22;ctx.fillStyle=i%3===0?'rgba(139,57,45,.16)':'rgba(75,83,100,.15)';ctx.beginPath();ctx.ellipse(ox,oy,rr*1.7,rr,0,0,Math.PI*2);ctx.fill()}ctx.strokeStyle='rgba(24,23,19,.38)';ctx.lineWidth=.6+c.p*1.8;ctx.beginPath();ctx.ellipse(0,0,r*.72,r*.3,0,0,Math.PI*2);ctx.stroke();ctx.restore()}function draw(now){const dt=Math.min(34,now-last);last=now;if(holding){pressure=Math.min(1,pressure+dt/(reduce?1200:1900));announce()}ctx.clearRect(0,0,w,h);for(let i=0;i<prints.length;i++)cloud(prints[i]);if(holding){ctx.strokeStyle=`rgba(24,23,19,${.2+pressure*.5})`;ctx.lineWidth=1+pressure*3;ctx.beginPath();ctx.ellipse(pointer.x*w,pointer.y*h,24+pressure*82,10+pressure*34,0,0,Math.PI*2);ctx.stroke()}requestAnimationFrame(draw)}announce();requestAnimationFrame(draw)})();
</script>
</body>
</html>
