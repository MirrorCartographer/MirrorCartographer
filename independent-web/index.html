<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#100f18">
<title>The Weather Inside a Bell</title>
<style>
:root{color-scheme:dark;--ink:#f5ead8;--dim:#a99fb7;--glass:rgba(255,255,255,.06);--line:rgba(255,255,255,.18)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#100f18;color:var(--ink);font-family:Georgia,"Times New Roman",serif;overflow:hidden}body{touch-action:none}
canvas{position:fixed;inset:0;width:100%;height:100%}
.shell{position:fixed;inset:0;display:grid;grid-template-rows:auto 1fr auto;padding:max(18px,env(safe-area-inset-top)) max(18px,env(safe-area-inset-right)) max(18px,env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-left));pointer-events:none}
header{display:flex;justify-content:space-between;gap:1rem;align-items:flex-start}.title{max-width:28rem}.kicker{font:600 .68rem/1.2 system-ui,sans-serif;letter-spacing:.23em;text-transform:uppercase;color:var(--dim)}h1{margin:.35rem 0 0;font-size:clamp(2rem,7vw,5.8rem);font-weight:400;line-height:.85;letter-spacing:-.045em}.meter{font:600 .7rem/1.2 system-ui,sans-serif;letter-spacing:.16em;text-transform:uppercase;text-align:right;color:var(--dim)}
.instructions{align-self:center;justify-self:center;text-align:center;max-width:24rem;font-style:italic;text-shadow:0 2px 20px #100f18;transition:opacity .6s}.instructions.hidden{opacity:0}
footer{display:flex;align-items:end;justify-content:space-between;gap:1rem;font:600 .66rem/1.35 system-ui,sans-serif;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.controls{display:flex;gap:.55rem;pointer-events:auto;align-items:center;flex-wrap:wrap}button,.afterbell{border:1px solid var(--line);background:var(--glass);backdrop-filter:blur(12px);color:var(--ink);border-radius:999px;padding:.75rem 1rem;font:600 .68rem/1 system-ui,sans-serif;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;text-decoration:none}button:focus-visible,.afterbell:focus-visible{outline:2px solid var(--ink);outline-offset:3px}.afterbell{opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .8s,transform .8s,border-color .8s}.afterbell.revealed{opacity:1;transform:none;pointer-events:auto;border-color:rgba(245,234,216,.55)}.state{min-width:10rem;text-align:right}
@media (max-width:620px){header{gap:.5rem}.meter{font-size:.58rem}.controls{flex-direction:column;align-items:flex-start}button,.afterbell{padding:.68rem .85rem}.state{max-width:9rem}}
@media (prefers-reduced-motion:reduce){.instructions,.afterbell{transition:none}}
</style>
</head>
<body>
<canvas id="sky" aria-hidden="true"></canvas>
<div class="shell">
<header><div class="title"><div class="kicker">A playable weather instrument</div><h1>The Weather<br>Inside a Bell</h1></div><div class="meter" id="meter">air: still<br>metal: sleeping<br>pressure: 0%<br>score: unwritten</div></header>
<div class="instructions" id="instructions">Tap to strike. Drag to bend the air. Hold, then release, to write pressure into weather. Two fingers summon rain.</div>
<footer><div class="controls"><button id="sound" type="button" aria-pressed="false">Wake sound</button><button id="erase" type="button">Erase score</button><a id="afterbell" class="afterbell" href="./afterbell.html" aria-hidden="true" tabindex="-1">Enter Afterbell</a></div><div class="state" id="state" aria-live="polite">waiting for touch</div></footer>
</div>
<script type="module">
import {WeatherScore,scoreFrequency} from './weather-score.mjs';
const canvas=document.querySelector('#sky'),ctx=canvas.getContext('2d',{alpha:false});
const meter=document.querySelector('#meter'),state=document.querySelector('#state'),hint=document.querySelector('#instructions'),soundButton=document.querySelector('#sound'),eraseButton=document.querySelector('#erase'),afterbell=document.querySelector('#afterbell');
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches,score=new WeatherScore({limit:8});
let w=0,h=0,dpr=1,t=0,last=performance.now(),pointer={x:.5,y:.5,down:false},energy=.08,rain=0,flash=0,audio=null,holdStarted=0,pressure=0,thresholdOpen=false;
const shockwaves=[],drops=Array.from({length:180},(_,i)=>({x:Math.random(),y:Math.random(),v:.3+Math.random()*.9,l:.015+Math.random()*.04,p:i}));
function resize(){dpr=Math.min(2,devicePixelRatio||1);w=innerWidth;h=innerHeight;canvas.width=w*dpr;canvas.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',resize);resize();
function palette(x,y,memory){const hue=238+x*58+Math.sin(t*.00012)*14+memory.interval*2;return{sky:`hsl(${hue} 25% ${8+y*5}%)`,glow:`hsla(${hue+42} 78% 70% / ${.08+energy*.22+memory.meanForce*.05})`}}
function drawScore(memory){const points=score.points();if(!points.length)return;ctx.save();ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();points.forEach((event,index)=>{const age=(points.length-index)/points.length,x=event.x*w,y=event.y*h;if(index===0)ctx.moveTo(x,y);else ctx.quadraticCurveTo(memory.centroid.x*w,memory.centroid.y*h,x,y);ctx.moveTo(x+3,y);ctx.arc(x,y,3+event.force*10,0,Math.PI*2);ctx.strokeStyle=`rgba(245,234,216,${.08+age*.18})`;ctx.lineWidth=.7+event.force*1.8});ctx.stroke();ctx.restore()}
function revealAfterbell(memory){if(thresholdOpen||memory.count<3)return;thresholdOpen=true;afterbell.classList.add('revealed');afterbell.setAttribute('aria-hidden','false');afterbell.removeAttribute('tabindex');state.textContent='a second chamber opened';}
function closeAfterbell(){thresholdOpen=false;afterbell.classList.remove('revealed');afterbell.setAttribute('aria-hidden','true');afterbell.setAttribute('tabindex','-1')}
function draw(now){const dt=Math.min(32,now-last);last=now;t+=reduce?0:dt;energy*=Math.pow(.994,dt/16);flash*=.94;pressure=pointer.down?Math.min(1,(now-holdStarted)/1800):Math.max(0,pressure-dt*.0025);rain+=(Math.max(0,(navigator.maxTouchPoints>1&&activePointers.size>1)?1:0)-rain)*.06;const memory=score.snapshot(),p=palette(pointer.x,pointer.y,memory);
ctx.fillStyle=p.sky;ctx.fillRect(0,0,w,h);const gx=pointer.x*w,gy=pointer.y*h,g=ctx.createRadialGradient(gx,gy,0,gx,gy,Math.max(w,h)*.75);g.addColorStop(0,p.glow);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);drawScore(memory);
ctx.save();ctx.translate(w/2,h*.55);const radius=Math.min(w,h)*(.18+energy*.05-pressure*.025+memory.meanForce*.015);for(let i=0;i<7;i++){ctx.beginPath();const r=radius+i*radius*.22+Math.sin(t*.001+i+memory.interval*.2)*energy*18;ctx.ellipse(0,0,r,r*(1.15+pointer.y*.35),0,Math.PI,Math.PI*2);ctx.strokeStyle=`rgba(245,234,216,${.2-i*.018+pressure*.08})`;ctx.lineWidth=1+i*.16+pressure*1.2;ctx.stroke()}ctx.restore();
for(let i=shockwaves.length-1;i>=0;i--){const s=shockwaves[i];s.life-=reduce?.16:dt/900;s.radius+=(reduce?42:dt*.52)*(1+s.force);if(s.life<=0){shockwaves.splice(i,1);continue}ctx.beginPath();ctx.arc(s.x*w,s.y*h,s.radius,0,Math.PI*2);ctx.strokeStyle=`rgba(255,241,210,${s.life*.55})`;ctx.lineWidth=1+s.force*5*s.life;ctx.stroke()}
if(rain>.02){ctx.lineWidth=1;for(const d of drops){d.y+=d.v*(.004+rain*.016);if(d.y>1.05){d.y=-.05;d.x=Math.random()}ctx.beginPath();ctx.moveTo(d.x*w,d.y*h);ctx.lineTo(d.x*w-4-rain*8,d.y*h+d.l*h);ctx.strokeStyle=`rgba(205,220,255,${rain*(.12+(d.p%7)/50)})`;ctx.stroke()}}if(flash>.01){ctx.fillStyle=`rgba(255,248,225,${flash*.25})`;ctx.fillRect(0,0,w,h)}
meter.innerHTML=`air: ${energy>.62?'storming':energy>.24?'turning':'still'}<br>metal: ${audio?'awake':'sleeping'}<br>pressure: ${Math.round(pressure*100)}%<br>score: ${memory.temperament} ${memory.count}/8`;requestAnimationFrame(draw)}requestAnimationFrame(draw);
const activePointers=new Set();function locate(e){pointer.x=e.clientX/w;pointer.y=e.clientY/h}
function strike(x=pointer.x,y=pointer.y,force=.34){const memory=score.snapshot();energy=Math.min(1,energy+force);flash=Math.min(1,.55+force);hint.classList.add('hidden');if(!audio)return;const now=audio.ctx.currentTime,partials=[1,2.04,2.93,4.16,5.43],root=scoreFrequency(150+x*260,memory);partials.forEach((m,i)=>{const o=audio.ctx.createOscillator(),g=audio.ctx.createGain(),pan=audio.ctx.createStereoPanner();o.type=i%2?'sine':'triangle';o.frequency.value=root*m;pan.pan.value=x*2-1;g.gain.setValueAtTime(.0001,now);g.gain.exponentialRampToValueAtTime((.13/(i+1))*(.5+y)*(1+force),now+.008);g.gain.exponentialRampToValueAtTime(.0001,now+1.6+i*.45);o.connect(g).connect(pan).connect(audio.master);o.start(now);o.stop(now+4)})}
function releasePressure(){const force=pressure;if(force>.12){score.add({x:pointer.x,y:pointer.y,force,at:performance.now()});shockwaves.push({x:pointer.x,y:pointer.y,radius:8,life:1,force});strike(pointer.x,pointer.y,.2+force*.65);const memory=score.snapshot();state.textContent=force>.72?`thunder wrote note ${memory.count}`:`weather wrote note ${memory.count}`;revealAfterbell(memory)}pressure=0;holdStarted=0}
canvas.addEventListener('pointerdown',e=>{activePointers.add(e.pointerId);pointer.down=true;locate(e);holdStarted=performance.now();canvas.setPointerCapture(e.pointerId);strike()});canvas.addEventListener('pointermove',e=>{if(!activePointers.has(e.pointerId))return;locate(e);energy=Math.min(1,energy+.012);if(audio){audio.wind.frequency.setTargetAtTime(120+pointer.y*1100,audio.ctx.currentTime,.06);audio.windGain.gain.setTargetAtTime(.015+pointer.x*.055,audio.ctx.currentTime,.08)}});function release(e){activePointers.delete(e.pointerId);if(activePointers.size===0){pointer.down=false;releasePressure()}}canvas.addEventListener('pointerup',release);canvas.addEventListener('pointercancel',release);
async function wake(){if(audio){await audio.ctx.resume();return}const AC=window.AudioContext||window.webkitAudioContext;if(!AC){state.textContent='sound unavailable';return}const ac=new AC(),master=ac.createGain();master.gain.value=.72;master.connect(ac.destination);const wind=ac.createBiquadFilter(),windGain=ac.createGain(),buffer=ac.createBuffer(1,ac.sampleRate*2,ac.sampleRate),data=buffer.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;const noise=ac.createBufferSource();noise.buffer=buffer;noise.loop=true;wind.type='bandpass';wind.frequency.value=440;wind.Q.value=.7;windGain.gain.value=.022;noise.connect(wind).connect(windGain).connect(master);noise.start();audio={ctx:ac,master,wind,windGain};await ac.resume();soundButton.textContent='Sound awake';soundButton.setAttribute('aria-pressed','true');state.textContent='the bell is listening';strike(.5,.5)}
soundButton.addEventListener('click',wake);eraseButton.addEventListener('click',()=>{score.clear();shockwaves.length=0;closeAfterbell();state.textContent='the weather forgot its score'});document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();if(!pointer.down){pointer.down=true;holdStarted=performance.now();strike(Math.random(),Math.random())}}if(e.key.toLowerCase()==='s')wake();if(e.key.toLowerCase()==='e')eraseButton.click();if(e.key.toLowerCase()==='a'&&thresholdOpen)location.href=afterbell.href});document.addEventListener('keyup',e=>{if(e.code==='Space'&&pointer.down){pointer.down=false;releasePressure()}});
</script>
</body>
</html>
