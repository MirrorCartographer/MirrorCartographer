<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#17130f">
<title>The House That Forgets Gravity</title>
<style>
:root{--ink:#17130f;--paper:#f3e8cf;--rust:#a4472f;--sky:#6f94a8;--gold:#d9aa4e;--tilt:0deg;--lift:0px}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--ink);color:var(--ink);font-family:Georgia,'Times New Roman',serif;overflow:hidden}
button{font:inherit}.stage{position:relative;width:100vw;height:100svh;min-height:480px;background:radial-gradient(circle at 65% 15%,#fff3d6 0 5%,transparent 18%),linear-gradient(180deg,#7ca0b0 0 47%,#ead7b2 47% 100%);isolation:isolate;touch-action:manipulation}
.stage::after{content:"";position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(7deg,transparent 0 16px,rgba(23,19,15,.035) 17px 18px);mix-blend-mode:multiply}
.house{position:absolute;left:50%;bottom:7vh;width:min(78vw,820px);height:min(66vh,590px);transform:translateX(-50%) rotate(var(--tilt));transform-origin:50% 100%;transition:transform 900ms cubic-bezier(.2,.8,.2,1)}
.wall{position:absolute;inset:10% 5% 0;background:var(--paper);border:5px solid var(--ink);box-shadow:14px 16px 0 rgba(23,19,15,.3);clip-path:polygon(0 18%,50% 0,100% 18%,100% 100%,0 100%)}
.window{position:absolute;width:24%;height:31%;top:36%;left:15%;border:4px solid var(--ink);background:linear-gradient(135deg,#ffd56f,#f28c5f 45%,#6f94a8 46%);box-shadow:inset 0 0 0 8px rgba(243,232,207,.5)}
.window::before,.window::after{content:"";position:absolute;background:var(--ink)}.window::before{left:50%;top:0;bottom:0;width:3px}.window::after{top:50%;left:0;right:0;height:3px}
.door{position:absolute;right:16%;bottom:0;width:23%;height:47%;background:var(--rust);border:4px solid var(--ink)}.door::after{content:"";position:absolute;width:12px;height:12px;border:3px solid var(--ink);border-radius:50%;right:14%;top:49%;background:var(--gold)}
.object{position:absolute;display:grid;place-items:center;border:4px solid var(--ink);box-shadow:5px 6px 0 rgba(23,19,15,.25);transition:transform 1200ms cubic-bezier(.2,.9,.1,1),left 1200ms cubic-bezier(.2,.9,.1,1),top 1200ms cubic-bezier(.2,.9,.1,1)}
.clock{left:43%;top:28%;width:82px;height:82px;border-radius:50%;background:#f8f1df;font-size:2rem}.chair{left:44%;top:62%;width:110px;height:95px;background:var(--gold);clip-path:polygon(12% 0,88% 0,82% 60%,100% 60%,92% 100%,72% 100%,68% 62%,32% 62%,28% 100%,8% 100%,0 60%,18% 60%)}
.fish{left:61%;top:31%;width:120px;height:62px;border-radius:55% 45% 45% 55%;background:var(--sky);font-size:2rem}.fish::after{content:"";position:absolute;right:-35px;border-left:38px solid var(--sky);border-top:25px solid transparent;border-bottom:25px solid transparent;filter:drop-shadow(4px 3px 0 var(--ink))}
.word{left:21%;top:72%;padding:.55rem .8rem;background:#f8f1df;transform:rotate(-4deg);font-style:italic}
.stage[data-gravity="north"] .object{transform:translateY(-190px) rotate(14deg)}.stage[data-gravity="east"] .object{transform:translateX(180px) rotate(92deg)}.stage[data-gravity="west"] .object{transform:translateX(-170px) rotate(-88deg)}.stage[data-gravity="gone"] .clock{transform:translate(19vw,-22vh) rotate(240deg)}.stage[data-gravity="gone"] .chair{transform:translate(-24vw,-13vh) rotate(-145deg)}.stage[data-gravity="gone"] .fish{transform:translate(8vw,25vh) rotate(35deg)}.stage[data-gravity="gone"] .word{transform:translate(28vw,-31vh) rotate(11deg)}
.title{position:absolute;z-index:5;left:max(18px,env(safe-area-inset-left));top:max(18px,env(safe-area-inset-top));max-width:min(520px,80vw);margin:0;color:#fff8e9;text-shadow:3px 3px 0 var(--ink);font-size:clamp(2rem,6vw,5.2rem);line-height:.82;letter-spacing:-.055em;transform:rotate(-2deg)}
.controls{position:absolute;z-index:6;right:max(16px,env(safe-area-inset-right));top:max(16px,env(safe-area-inset-top));display:flex;gap:.55rem;flex-wrap:wrap;justify-content:flex-end;max-width:52vw}.controls button{min-width:48px;min-height:48px;border:3px solid var(--ink);background:#fff7e5;color:var(--ink);box-shadow:4px 4px 0 var(--ink);cursor:pointer}.controls button:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--ink)}
.caption{position:absolute;z-index:6;left:50%;bottom:max(14px,env(safe-area-inset-bottom));transform:translateX(-50%) rotate(1deg);margin:0;padding:.5rem .8rem;background:rgba(255,247,229,.92);border:3px solid var(--ink);font-size:clamp(.88rem,2.5vw,1.1rem);white-space:nowrap}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
@media(max-width:640px){.house{width:94vw;height:61vh;bottom:9vh}.title{font-size:clamp(2.2rem,13vw,4.3rem);max-width:62vw}.controls{max-width:35vw}.controls button{font-size:0}.controls button::first-letter{font-size:1.3rem}.object{scale:.8}.fish{left:57%}.caption{max-width:92vw;white-space:normal;text-align:center}}
@media(prefers-reduced-motion:reduce){.house,.object{transition:none!important}.stage::after{display:none}}
</style>
</head>
<body>
<main class="stage" id="stage" data-gravity="south" aria-describedby="status">
  <h1 class="title">The House<br>That Forgets<br>Gravity</h1>
  <nav class="controls" aria-label="Change gravity">
    <button data-direction="north" aria-label="Gravity toward the ceiling">↑ North</button>
    <button data-direction="west" aria-label="Gravity toward the left wall">← West</button>
    <button data-direction="south" aria-label="Gravity toward the floor">↓ South</button>
    <button data-direction="east" aria-label="Gravity toward the right wall">→ East</button>
    <button data-direction="gone" aria-label="Turn gravity off">✦ Gone</button>
    <button id="sound" aria-pressed="false" aria-label="Toggle house sound">♫ Sound</button>
  </nav>
  <section class="house" aria-label="A crooked illustrated house whose contents respond to gravity">
    <div class="wall"></div><div class="window"></div><div class="door"></div>
    <div class="object clock" aria-hidden="true">◷</div><div class="object chair" aria-hidden="true"></div><div class="object fish" aria-hidden="true">•</div><div class="object word" aria-hidden="true">almost</div>
  </section>
  <p class="caption">Choose a wall. The room will believe you.</p>
  <p class="sr-only" id="status" aria-live="polite">Gravity points toward the floor.</p>
</main>
<script>
(()=>{const stage=document.querySelector('#stage');const status=document.querySelector('#status');const sound=document.querySelector('#sound');let audio=null;let on=false;const labels={north:'ceiling',south:'floor',east:'right wall',west:'left wall',gone:'nowhere'};
function tone(direction){if(!on)return;audio??=new (window.AudioContext||window.webkitAudioContext)();const now=audio.currentTime;const osc=audio.createOscillator();const gain=audio.createGain();const notes={north:523.25,south:196,east:392,west:261.63,gone:659.25};osc.frequency.value=notes[direction];osc.type=direction==='gone'?'triangle':'sine';gain.gain.setValueAtTime(.0001,now);gain.gain.exponentialRampToValueAtTime(.06,now+.02);gain.gain.exponentialRampToValueAtTime(.0001,now+.45);osc.connect(gain).connect(audio.destination);osc.start(now);osc.stop(now+.47)}
function setGravity(direction){stage.dataset.gravity=direction;document.documentElement.style.setProperty('--tilt',direction==='east'?'2deg':direction==='west'?'-2deg':'0deg');status.textContent=`Gravity points toward ${labels[direction]}.`;tone(direction)}
document.querySelectorAll('[data-direction]').forEach(button=>button.addEventListener('click',()=>setGravity(button.dataset.direction)));
sound.addEventListener('click',async()=>{audio??=new (window.AudioContext||window.webkitAudioContext)();if(audio.state==='suspended')await audio.resume();on=!on;sound.setAttribute('aria-pressed',String(on));sound.textContent=on?'♫ On':'♫ Sound';if(on)tone(stage.dataset.gravity)});
let start=null;stage.addEventListener('pointerdown',e=>{start={x:e.clientX,y:e.clientY}}, {passive:true});stage.addEventListener('pointerup',e=>{if(!start)return;const dx=e.clientX-start.x,dy=e.clientY-start.y;if(Math.hypot(dx,dy)>55)setGravity(Math.abs(dx)>Math.abs(dy)?(dx>0?'east':'west'):(dy>0?'south':'north'));start=null},{passive:true});
window.__INDEPENDENT_CREATIVE_EVIDENCE__={piece:'the-house-that-forgets-gravity',version:'1.0.0',interactions:['buttons','swipe','optional-web-audio'],payments:false,mirrorCartographerReferences:false};})();
</script>
</body>
</html>
