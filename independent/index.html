<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>The Small Weather Machine</title><style>*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#09070f;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}canvas{position:fixed;inset:0;width:100%;height:100%}.hud{position:fixed;inset:18px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;mix-blend-mode:difference}.hud b{font-size:11px;letter-spacing:.22em;text-transform:uppercase}.note{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);font-size:11px;letter-spacing:.18em;text-transform:uppercase;opacity:.58;pointer-events:none;white-space:nowrap}.seed{position:fixed;inset:0;border:0;background:transparent;cursor:crosshair}</style></head><body><canvas id="c"></canvas><button class="seed" aria-label="change the weather"></button><div class="hud"><b>The Small Weather Machine</b><b id="mood">waiting</b></div><div class="note">touch anywhere · every touch changes the climate</div><script>const c=document.querySelector('#c'),x=c.getContext('2d'),m=document.querySelector('#mood');let w,h,d=1,t=0,climate=0.18,wind=.4,heat=.3,stars=[];const moods=['glass rain','soft voltage','violet drought','silver pollen','night orchard','electric fog'];function size(){d=Math.min(2,devicePixelRatio||1);w=innerWidth;h=innerHeight;c.width=w*d;c.height=h*d;x.setTransform(d,0,0,d,0,0);stars=Array.from({length:Math.min(180,Math.floor(w*h/7000))},()=>({x:Math.random()*w,y:Math.random()*h,z:Math.random(),p:Math.random()*6.28}))}function touch(e){const q=e.touches?.[0]||e;climate=Math.random();wind=(q.clientX/w)*1.6-.8;heat=1-q.clientY/h;m.textContent=moods[Math.floor(climate*moods.length)];for(let i=0;i<12;i++)stars.push({x:q.clientX,y:q.clientY,z:Math.random(),p:Math.random()*6.28,burst:1})}function draw(){t+=.008;x.fillStyle=`rgba(${8+heat*15},${6+climate*9},${18+climate*28},.18)`;x.fillRect(0,0,w,h);const g=x.createRadialGradient(w*(.2+climate*.6),h*(.2+heat*.5),0,w/2,h/2,Math.max(w,h)*.8);g.addColorStop(0,`hsla(${180+climate*160},80%,65%,.12)`);g.addColorStop(1,'transparent');x.fillStyle=g;x.fillRect(0,0,w,h);x.globalCompositeOperation='screen';stars.forEach((s,i)=>{s.x+=wind*(.15+s.z*.7)+(s.burst?Math.cos(s.p)*2:0);s.y+=.08+s.z*.45+(s.burst?Math.sin(s.p)*2:0);s.p+=.025;s.burst*=.96;if(s.x>w+20)s.x=-20;if(s.x<-20)s.x=w+20;if(s.y>h+20)s.y=-20;const r=.6+s.z*3+(s.burst||0)*4;x.fillStyle=`hsla(${160+climate*190+s.z*30},90%,75%,${.18+s.z*.55})`;x.beginPath();x.arc(s.x+Math.sin(t*10+s.p)*6*s.z,s.y,r,0,6.283);x.fill();if(s.burst<.02)delete s.burst});x.globalCompositeOperation='source-over';requestAnimationFrame(draw)}addEventListener('resize',size);document.querySelector('.seed').addEventListener('pointerdown',touch);size();m.textContent=moods[0];draw()</script></body></html>
