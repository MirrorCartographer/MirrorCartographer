<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Mirror Cartographer five-steward orchestration map</title>
  <desc id="desc">A central coordination core surrounded by Build, Research, Art, Resources, and AI Partner stewards. Directed paths show evidence moving inward and verified work moving outward.</desc>
  <defs>
    <radialGradient id="background" cx="50%" cy="45%" r="75%">
      <stop offset="0" stop-color="#202044"/>
      <stop offset="0.58" stop-color="#0f1229"/>
      <stop offset="1" stop-color="#080a18"/>
    </radialGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2d18a"/>
      <stop offset="1" stop-color="#b695f4"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#bfc5e7"/>
    </marker>
    <style>
      .orbit { fill: none; stroke: #666b9c; stroke-width: 1.5; stroke-dasharray: 5 10; opacity: .55; }
      .flow { fill: none; stroke: #bfc5e7; stroke-width: 2.2; marker-end: url(#arrow); opacity: .75; }
      .node { fill: #171a37; stroke-width: 2; }
      .node-title { fill: #fbf7ee; font: 700 25px ui-sans-serif, system-ui, sans-serif; text-anchor: middle; }
      .node-sub { fill: #c4c8df; font: 15px ui-sans-serif, system-ui, sans-serif; text-anchor: middle; }
      .core-title { fill: #090b19; font: 800 31px ui-sans-serif, system-ui, sans-serif; text-anchor: middle; }
      .core-sub { fill: #1a1d35; font: 16px ui-sans-serif, system-ui, sans-serif; text-anchor: middle; }
      .legend { fill: #d9dced; font: 15px ui-sans-serif, system-ui, sans-serif; }
      .small { fill: #aeb4d1; font: 13px ui-sans-serif, system-ui, sans-serif; }
      @media (prefers-reduced-motion: no-preference) {
        .pulse { animation: breathe 5s ease-in-out infinite; transform-origin: 600px 378px; }
        @keyframes breathe { 0%,100% { opacity:.82; transform:scale(.98) } 50% { opacity:1; transform:scale(1.025) } }
      }
    </style>
  </defs>

  <rect width="1200" height="760" rx="32" fill="url(#background)"/>
  <circle cx="600" cy="378" r="292" class="orbit"/>
  <circle cx="600" cy="378" r="210" class="orbit" opacity=".32"/>

  <!-- Evidence flows inward; verified actions return outward. -->
  <path class="flow" d="M600 174 C600 230 600 270 600 310"/>
  <path class="flow" d="M842 290 C790 313 755 331 700 354"/>
  <path class="flow" d="M790 554 C753 516 727 485 687 444"/>
  <path class="flow" d="M410 554 C447 516 473 485 513 444"/>
  <path class="flow" d="M358 290 C410 313 445 331 500 354"/>

  <g class="pulse" filter="url(#softGlow)">
    <circle cx="600" cy="378" r="104" fill="url(#core)"/>
  </g>
  <text x="600" y="365" class="core-title">COORDINATION CORE</text>
  <text x="600" y="393" class="core-sub">evidence → decision → action</text>
  <text x="600" y="419" class="core-sub">one verified state change</text>

  <g aria-label="Build steward">
    <circle cx="600" cy="112" r="82" class="node" stroke="#83d6b2"/>
    <text x="600" y="105" class="node-title">BUILD</text>
    <text x="600" y="131" class="node-sub">tests · repair · ship</text>
  </g>

  <g aria-label="Research steward">
    <circle cx="890" cy="270" r="82" class="node" stroke="#88b9ff"/>
    <text x="890" y="263" class="node-title">RESEARCH</text>
    <text x="890" y="289" class="node-sub">sources · falsify · decide</text>
  </g>

  <g aria-label="Resource steward">
    <circle cx="824" cy="606" r="82" class="node" stroke="#e2c17c"/>
    <text x="824" y="599" class="node-title">RESOURCES</text>
    <text x="824" y="625" class="node-sub">cost · license · exit</text>
  </g>

  <g aria-label="Art steward">
    <circle cx="376" cy="606" r="82" class="node" stroke="#ef9fc7"/>
    <text x="376" y="599" class="node-title">ART</text>
    <text x="376" y="625" class="node-sub">symbol · form · access</text>
  </g>

  <g aria-label="AI Partner steward">
    <circle cx="310" cy="270" r="82" class="node" stroke="#ba9df5"/>
    <text x="310" y="263" class="node-title">AI PARTNER</text>
    <text x="310" y="289" class="node-sub">verify · connect · correct</text>
  </g>

  <g transform="translate(54 690)">
    <line x1="0" y1="0" x2="54" y2="0" class="flow"/>
    <text x="70" y="5" class="legend">Evidence and handoff flow</text>
    <text x="384" y="5" class="small">Hierarchy is encoded by position, scale, labels, and stroke—not color alone.</text>
  </g>
</svg>
