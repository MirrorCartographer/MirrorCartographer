name: Deploy Cloudflare research surface

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Cloudflare Pages deployment branch
        required: false
        default: main

permissions:
  contents: read
  deployments: write
  id-token: write
  attestations: write

concurrency:
  group: cloudflare-research-production
  cancel-in-progress: false

jobs:
  deploy-and-verify:
    runs-on: ubuntu-latest
    environment: cloudflare-research
    steps:
      - name: Checkout committed source
        uses: actions/checkout@v6

      - name: Test deployment evidence contracts
        run: |
          node --test cloudflare-static/research-surface-identity.test.mjs
          node --test cloudflare-static/check-deployment-readiness.test.mjs
          node --test cloudflare-static/probe-cloudflare-access.test.mjs
          node --test cloudflare-static/cloudflare-access-workflow-contract.test.mjs
          node --test cloudflare-static/summarize-deployment-blocker.test.mjs
          node --test cloudflare-static/validate-deployment-blocker.test.mjs
          node --test cloudflare-static/build-deployment-decision.test.mjs
          node --test cloudflare-static/attest-deployment-proof.test.mjs
          node --test cloudflare-static/normalize-github-attestation-verification.test.mjs
          node --test cloudflare-static/evaluate-signer-authorization.test.mjs
          node --test cloudflare-static/build-evidence-verification-input.test.mjs
          node --test cloudflare-static/build-evidence-acceptance.test.mjs
          node --test cloudflare-static/evaluate-signed-deployment-evidence.test.mjs
          node --test cloudflare-static/cryptographic-attestation-workflow.test.mjs
          node --test cloudflare-static/validate-deployment-proof-context.test.mjs

      - name: Verify committed research surface identity
        run: |
          node --input-type=module - <<'NODE'
          import fs from 'node:fs';
          import { inspectResearchSurfaceIdentity } from './cloudflare-static/research-surface-identity.mjs';
          const body = fs.readFileSync('./cloudflare-static/index.html', 'utf8');
          const result = inspectResearchSurfaceIdentity(body, {
            status: 200,
            resolvedUrl: 'file://cloudflare-static/index.html'
          });
          process.stdout.write(`${JSON.stringify(result)}\n`);
          if (!result.ok) process.exit(1);
          NODE

      - name: Classify deployment readiness
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: node cloudflare-static/check-deployment-readiness.mjs cloudflare-deployment-readiness.json

      - name: Probe active Cloudflare Pages access
        id: access_probe
        continue-on-error: true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: node cloudflare-static/probe-cloudflare-access.mjs cloudflare-access-probe.json

      - name: Summarize deployment blocker
        if: always()
        run: node cloudflare-static/summarize-deployment-blocker.mjs cloudflare-deployment-readiness.json cloudflare-deployment-blocker.json

      - name: Validate deployment blocker contract
        if: always()
        run: node cloudflare-static/validate-deployment-blocker.mjs cloudflare-deployment-blocker.json

      - name: Deploy static research surface
        id: deploy
        if: steps.access_probe.outcome == 'success'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: cloudflare-static
          command: >-
            pages deploy .
            --project-name=mirror-cartographer-research
            --branch=${{ inputs.branch }}
            --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Record deployment decision
        if: always()
        env:
          DEPLOY_STEP_OUTCOME: ${{ steps.deploy.outcome }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: node cloudflare-static/build-deployment-decision.mjs cloudflare-deployment-readiness.json cloudflare-deployment-decision.json

      - name: Verify served identity
        if: steps.deploy.outcome == 'success'
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          test -n "$DEPLOYMENT_URL" || { echo "Wrangler returned no deployment URL"; exit 3; }
          node cloudflare-static/verify-deployment.mjs "$DEPLOYMENT_URL" | tee cloudflare-deployment-proof.ndjson

      - name: Record deployment proof
        if: always()
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const proof = {
            schema_version: '1.0.0',
            source_commit: process.env.GITHUB_SHA,
            workflow_run: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            deployment_url: process.env.DEPLOYMENT_URL || null,
            alias_url: process.env.ALIAS_URL || null,
            readiness: fs.existsSync('cloudflare-deployment-readiness.json')
              ? JSON.parse(fs.readFileSync('cloudflare-deployment-readiness.json', 'utf8'))
              : null,
            access_probe: fs.existsSync('cloudflare-access-probe.json')
              ? JSON.parse(fs.readFileSync('cloudflare-access-probe.json', 'utf8'))
              : null,
            blocker: fs.existsSync('cloudflare-deployment-blocker.json')
              ? JSON.parse(fs.readFileSync('cloudflare-deployment-blocker.json', 'utf8'))
              : null,
            deployment_decision: fs.existsSync('cloudflare-deployment-decision.json')
              ? JSON.parse(fs.readFileSync('cloudflare-deployment-decision.json', 'utf8'))
              : null,
            verifier_output: fs.existsSync('cloudflare-deployment-proof.ndjson')
              ? fs.readFileSync('cloudflare-deployment-proof.ndjson', 'utf8').trim().split('\n').filter(Boolean).map((line) => JSON.parse(line))
              : [],
            generated_at: new Date().toISOString()
          };
          fs.writeFileSync('cloudflare-deployment-proof.json', JSON.stringify(proof, null, 2) + '\n');
          NODE

      - name: Validate deployment proof contract
        if: always()
        run: node cloudflare-static/validate-deployment-proof.mjs cloudflare-deployment-proof.json

      - name: Validate deployment proof run context
        if: always()
        run: node cloudflare-static/validate-deployment-proof-context.mjs cloudflare-deployment-proof.json

      - name: Build local in-toto evidence envelope
        if: always()
        env:
          RUN_STARTED_AT: ${{ github.event.repository.updated_at }}
        run: node cloudflare-static/attest-deployment-proof.mjs cloudflare-deployment-proof.json cloudflare-deployment-proof.intoto.json

      - name: Sign exact deployment proof bytes
        if: always()
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: cloudflare-deployment-proof.json

      - name: Verify GitHub artifact attestation
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh attestation verify cloudflare-deployment-proof.json \
            --repo "$GITHUB_REPOSITORY" \
            --format json > cloudflare-deployment-proof.signature-verification.raw.json
          verify_status=$?
          set -e
          if [ ! -s cloudflare-deployment-proof.signature-verification.raw.json ]; then
            printf '[]\n' > cloudflare-deployment-proof.signature-verification.raw.json
          fi
          node cloudflare-static/normalize-github-attestation-verification.mjs \
            cloudflare-deployment-proof.signature-verification.raw.json \
            cloudflare-deployment-proof.signature-verification.json
          test "$verify_status" -eq 0

      - name: Build explicit verification input manifest
        if: always()
        run: >-
          node cloudflare-static/build-evidence-verification-input.mjs
          cloudflare-deployment-proof.json
          cloudflare-deployment-proof.intoto.json
          cloudflare-deployment-proof.signature-verification.json
          cloudflare-evidence-verification-input.json

      - name: Evaluate deployment evidence acceptance
        if: always()
        run: >-
          node cloudflare-static/build-evidence-acceptance.mjs
          cloudflare-evidence-verification-input.json
          cloudflare-deployment-acceptance.json

      - name: Assert acceptance invariants
        if: always()
        run: |
          node --input-type=module - <<'NODE'
          import fs from 'node:fs';
          const decision = JSON.parse(fs.readFileSync('cloudflare-deployment-acceptance.json', 'utf8'));
          const input = JSON.parse(fs.readFileSync('cloudflare-evidence-verification-input.json', 'utf8'));
          const allRequired = input.signatureVerification?.status === 'verified'
            && input.signatureSubjectVerification?.status === 'match'
            && input.subjectVerification?.status === 'match'
            && input.trustedBuilderPolicy?.builder === 'trusted'
            && input.trustedBuilderPolicy?.source === 'trusted'
            && input.trustedBuilderPolicy?.buildType === 'match'
            && input.trustedBuilderPolicy?.externalParameters === 'recognized'
            && input.claimEvidence?.status === 'valid';
          if (decision.accepted !== allRequired) throw new Error('acceptance-must-equal-all-required-checks');
          process.stdout.write(`${JSON.stringify({ accepted: decision.accepted, signature: input.signatureVerification?.status, signatureSubject: input.signatureSubjectVerification?.status, claim: input.claimEvidence?.status })}\n`);
          NODE

      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-deployment-proof-${{ github.sha }}
          path: |
            cloudflare-deployment-readiness.json
            cloudflare-access-probe.json
            cloudflare-deployment-blocker.json
            cloudflare-deployment-decision.json
            cloudflare-deployment-proof.json
            cloudflare-deployment-proof.intoto.json
            cloudflare-deployment-proof.signature-verification.raw.json
            cloudflare-deployment-proof.signature-verification.json
            cloudflare-evidence-verification-input.json
            cloudflare-deployment-acceptance.json
          if-no-files-found: error
          retention-days: 30

      - name: Publish run summary
        if: always()
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
        run: |
          {
            echo "## Cloudflare research deployment"
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Deployment URL: ${DEPLOYMENT_URL:-not returned}"
            echo "- Alias URL: ${ALIAS_URL:-not returned}"
            echo "- Local identity contract: \`cloudflare-static/research-surface-identity.mjs\`"
            echo "- Readiness evidence: \`cloudflare-deployment-readiness.json\` (never contains secret values)"
            echo "- Access capability evidence: \`cloudflare-access-probe.json\` (token activity and account-scoped Pages authorization; no secret values)"
            echo "- Deployment gate: deployment runs only after the access probe succeeds"
            echo "- Actionable blocker: \`cloudflare-deployment-blocker.json\` (schema-validated names and reason codes only)"
            echo "- Deployment decision: \`cloudflare-deployment-decision.json\`"
            echo "- Identity verifier: \`cloudflare-static/verify-deployment.mjs\`"
            echo "- Run-context validator: \`cloudflare-static/validate-deployment-proof-context.mjs\`"
            echo "- Local provenance envelope: \`cloudflare-deployment-proof.intoto.json\`"
            echo "- GitHub cryptographic verification: \`cloudflare-deployment-proof.signature-verification.json\`"
            echo "- Signed-subject binding: \`signatureSubjectVerification.status\` must equal \`match\`"
            echo "- Verification input: \`cloudflare-evidence-verification-input.json\`"
            echo "- Acceptance decision: \`cloudflare-deployment-acceptance.json\`"
            echo "- Trust policy: exact workflow builder and repository, deny by default"
            echo "- Epistemic limit: signature verification authenticates provenance, not scientific truth"
          } >> "$GITHUB_STEP_SUMMARY"
