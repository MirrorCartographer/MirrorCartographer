name: Continuity integrity

on:
  pull_request:
    paths:
      - 'operations/continuity/**'
      - 'tools/continuity/**'
      - 'package.json'
      - '.github/workflows/continuity-integrity.yml'
  push:
    branches:
      - main
    paths:
      - 'operations/continuity/**'
      - 'tools/continuity/**'
      - 'package.json'
      - '.github/workflows/continuity-integrity.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: continuity-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test and validate continuity records
        run: npm run verify:continuity
