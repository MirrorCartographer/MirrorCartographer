name: Deploy Foundation Architecture Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'architecture/**'
      - '.github/workflows/deploy-foundation-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: foundation-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare site
        run: |
          mkdir -p _site/architecture
          cp docs/index.html _site/index.html
          cp architecture/FOUNDATION_INTELLIGENCE_ARCHITECTURE.md _site/architecture/FOUNDATION_INTELLIGENCE_ARCHITECTURE.md
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
