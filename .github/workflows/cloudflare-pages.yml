name: Deploy public site to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cloudflare-static/**"
      - "functions/**"
      - "tools/cloudflare-connector.mjs"
      - "wrangler.jsonc"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/cloudflare-pages.yml"

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run cloudflare:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: mirror-cartographer
          CLOUDFLARE_PRODUCTION_BRANCH: main
          CLOUDFLARE_OUTPUT_DIR: cloudflare-static
