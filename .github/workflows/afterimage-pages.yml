name: Deploy Afterimage

on:
  push:
    branches: [main]
    paths:
      - "independent/afterimage/**"
      - ".github/workflows/afterimage-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: afterimage-pages
  cancel-in-progress: true

jobs:
  verify-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact source
        uses: actions/checkout@v4

      - name: Verify deployment contract tests
        run: node --test independent/afterimage/verify-deployment.test.mjs

      - name: Build isolated publish directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir _site
          cp independent/afterimage/index.html _site/index.html
          cp independent/afterimage/deployment.json _site/deployment.json
          test "$(find _site -maxdepth 1 -type f | wc -l | tr -d ' ')" = "2"
          grep -F '<title>Afterimage</title>' _site/index.html
          grep -F 'No memory leaves this page.' _site/index.html
          grep -F 'afterimage-scene/2' _site/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload isolated site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy isolated site
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record deployment identity
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          SOURCE_COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          printf '{"schema":"afterimage-pages-deployment/1","source_commit":"%s","deployment_url":"%s","workflow_run":"%s"}\n' \
            "$SOURCE_COMMIT" "$PAGE_URL" "$GITHUB_RUN_ID" | tee afterimage-pages-deployment.json

      - name: Upload deployment identity
        uses: actions/upload-artifact@v4
        with:
          name: afterimage-pages-deployment
          path: afterimage-pages-deployment.json
          if-no-files-found: error
