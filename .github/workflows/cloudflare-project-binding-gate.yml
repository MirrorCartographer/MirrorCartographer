name: Cloudflare project binding gate

on:
  pull_request:
    paths:
      - '.github/workflows/cloudflare-pages-research.yml'
      - '.github/workflows/cloudflare-project-binding-gate.yml'
      - 'cloudflare-static/validate-stack-deployment-evidence.mjs'
      - 'cloudflare-static/validate-stack-deployment-evidence.test.mjs'
      - 'cloudflare-static/project-binding-gate-workflow.test.mjs'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cloudflare-pages-research.yml'
      - '.github/workflows/cloudflare-project-binding-gate.yml'
      - 'cloudflare-static/validate-stack-deployment-evidence.mjs'
      - 'cloudflare-static/validate-stack-deployment-evidence.test.mjs'
      - 'cloudflare-static/project-binding-gate-workflow.test.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-project-binding:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout committed source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Verify project-bound Cloudflare stack evidence
        run: node --test cloudflare-static/validate-stack-deployment-evidence.test.mjs
      - name: Verify gate workflow contract
        run: node --test cloudflare-static/project-binding-gate-workflow.test.mjs
