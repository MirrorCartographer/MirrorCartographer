name: Validate Cloudflare environment contract

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/cloudflare-pages-research.yml'
      - '.github/workflows/cloudflare-environment-contract.yml'
      - 'cloudflare-static/validate-workflow-environment-contract.mjs'
      - 'cloudflare-static/validate-workflow-environment-contract.test.mjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/cloudflare-pages-research.yml'
      - '.github/workflows/cloudflare-environment-contract.yml'
      - 'cloudflare-static/validate-workflow-environment-contract.mjs'
      - 'cloudflare-static/validate-workflow-environment-contract.test.mjs'

permissions:
  contents: read

jobs:
  validate-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout committed source
        uses: actions/checkout@v6

      - name: Test fail-closed environment contract
        run: node --test cloudflare-static/validate-workflow-environment-contract.test.mjs

      - name: Validate deployment workflow references
        run: >-
          node cloudflare-static/validate-workflow-environment-contract.mjs
          .github/workflows/cloudflare-pages-research.yml
