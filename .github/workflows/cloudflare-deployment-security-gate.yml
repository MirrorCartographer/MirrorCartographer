name: Audit Cloudflare deployment workflow security

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/cloudflare-pages-research.yml
      - .github/workflows/cloudflare-deployment-security-gate.yml
      - cloudflare-static/audit-cloudflare-workflow-security.mjs
      - cloudflare-static/audit-cloudflare-workflow-security.test.mjs
      - cloudflare-static/cloudflare-security-gate-workflow-contract.mjs
      - cloudflare-static/cloudflare-security-gate-workflow-contract.test.mjs
      - cloudflare-static/audit-action-references.mjs
      - cloudflare-static/audit-action-references.test.mjs
      - cloudflare-static/validate-action-pin-plan.mjs
      - cloudflare-static/validate-action-pin-plan.test.mjs
      - cloudflare-static/action-pin-plan.json
      - cloudflare-static/apply-action-pin-plan.mjs
      - cloudflare-static/apply-action-pin-plan.test.mjs
  pull_request:
    paths:
      - .github/workflows/cloudflare-pages-research.yml
      - .github/workflows/cloudflare-deployment-security-gate.yml
      - cloudflare-static/audit-cloudflare-workflow-security.mjs
      - cloudflare-static/audit-cloudflare-workflow-security.test.mjs
      - cloudflare-static/cloudflare-security-gate-workflow-contract.mjs
      - cloudflare-static/cloudflare-security-gate-workflow-contract.test.mjs
      - cloudflare-static/audit-action-references.mjs
      - cloudflare-static/audit-action-references.test.mjs
      - cloudflare-static/validate-action-pin-plan.mjs
      - cloudflare-static/validate-action-pin-plan.test.mjs
      - cloudflare-static/action-pin-plan.json
      - cloudflare-static/apply-action-pin-plan.mjs
      - cloudflare-static/apply-action-pin-plan.test.mjs

permissions:
  contents: read

jobs:
  audit-deployment-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout committed source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Test security audit and gate contract
        run: |
          node --test cloudflare-static/audit-cloudflare-workflow-security.test.mjs
          node --test cloudflare-static/cloudflare-security-gate-workflow-contract.test.mjs
          node --test cloudflare-static/audit-action-references.test.mjs
          node --test cloudflare-static/validate-action-pin-plan.test.mjs
          node --test cloudflare-static/apply-action-pin-plan.test.mjs

      - name: Audit deployment workflow
        run: >-
          node cloudflare-static/audit-cloudflare-workflow-security.mjs
          .github/workflows/cloudflare-pages-research.yml
          cloudflare-workflow-security-audit.json

      - name: Audit third-party action references
        run: >-
          node cloudflare-static/audit-action-references.mjs
          .github/workflows/cloudflare-pages-research.yml
          .github/workflows/cloudflare-deployment-security-gate.yml
          --output cloudflare-action-reference-audit.json

      - name: Upload security audit
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cloudflare-workflow-security-audit-${{ github.sha }}
          path: |
            cloudflare-workflow-security-audit.json
            cloudflare-action-reference-audit.json
          if-no-files-found: error
          retention-days: 30
