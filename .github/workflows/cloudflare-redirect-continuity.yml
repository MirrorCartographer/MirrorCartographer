name: Verify Cloudflare deployment redirect continuity

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/cloudflare-redirect-continuity.yml'
      - 'cloudflare-static/deployment-url-policy.mjs'
      - 'cloudflare-static/deployment-redirect-continuity.mjs'
      - 'cloudflare-static/deployment-redirect-continuity.test.mjs'
      - 'cloudflare-static/verify-deployment.mjs'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cloudflare-redirect-continuity.yml'
      - 'cloudflare-static/deployment-url-policy.mjs'
      - 'cloudflare-static/deployment-redirect-continuity.mjs'
      - 'cloudflare-static/deployment-redirect-continuity.test.mjs'
      - 'cloudflare-static/verify-deployment.mjs'

permissions:
  contents: read

concurrency:
  group: cloudflare-redirect-continuity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout committed source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Run adversarial redirect-continuity tests
        run: node --test cloudflare-static/deployment-redirect-continuity.test.mjs

      - name: Publish claim boundary
        run: |
          {
            echo '## Cloudflare deployment redirect continuity'
            echo '- Rejects host, path, or query substitution between the requested deployment URL and the final fetched URL.'
            echo '- Claim limit: this does not prove provider ownership, DNS authority, source commit, or served identity.'
          } >> "$GITHUB_STEP_SUMMARY"
