name: Frontier peer-terminal crash stress

on:
  workflow_dispatch:
  push:
    paths:
      - 'tools/frontier-research/filesystem-peer-terminal*.mjs'
      - 'tools/frontier-research/build-crash-stress-observation*.mjs'
      - 'tools/frontier-research/verify-crash-stress-observation*.mjs'
      - 'tools/frontier-research/classify-crash-stress-evidence*.mjs'
      - '.github/workflows/frontier-peer-terminal-crash-stress.yml'

permissions:
  contents: read

jobs:
  crash-stress:
    name: crash-stress (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4

      - name: Record runner identity
        shell: bash
        run: |
          mkdir -p operations/runtime-evidence/frontier-peer-terminal-crash-stress
          {
            echo "commit=${GITHUB_SHA}"
            echo "runner_os=${RUNNER_OS}"
            echo "runner_arch=${RUNNER_ARCH}"
            echo "node=$(node --version)"
            echo "filesystem=$(node -e \"const fs=require('node:fs'); console.log(fs.statfsSync('.').type.toString(16))\")"
          } | tee operations/runtime-evidence/frontier-peer-terminal-crash-stress/runner-${RUNNER_OS}.txt

      - name: Run repeated crash-recovery contract and build observation
        shell: bash
        run: |
          set +e
          export EVIDENCE_SUMMARY_PATH="operations/runtime-evidence/frontier-peer-terminal-crash-stress/summary-${RUNNER_OS}.json"
          node --test tools/frontier-research/filesystem-peer-terminal-crash-stress.test.mjs \
            2>&1 | tee "operations/runtime-evidence/frontier-peer-terminal-crash-stress/test-${RUNNER_OS}.log"
          test_exit_code=${PIPESTATUS[0]}
          node tools/frontier-research/build-crash-stress-observation.mjs \
            "operations/runtime-evidence/frontier-peer-terminal-crash-stress/runner-${RUNNER_OS}.txt" \
            "operations/runtime-evidence/frontier-peer-terminal-crash-stress/summary-${RUNNER_OS}.json" \
            "operations/runtime-evidence/frontier-peer-terminal-crash-stress/test-${RUNNER_OS}.log" \
            "operations/runtime-evidence/frontier-peer-terminal-crash-stress/observation-${RUNNER_OS}.json" \
            "${test_exit_code}"
          exit "${test_exit_code}"

      - name: Verify retained observation bytes and exact commit
        if: always()
        shell: bash
        run: |
          node tools/frontier-research/verify-crash-stress-observation.mjs \
            "operations/runtime-evidence/frontier-peer-terminal-crash-stress/observation-${RUNNER_OS}.json" \
            "operations/runtime-evidence/frontier-peer-terminal-crash-stress/runner-${RUNNER_OS}.txt" \
            "operations/runtime-evidence/frontier-peer-terminal-crash-stress/summary-${RUNNER_OS}.json" \
            "operations/runtime-evidence/frontier-peer-terminal-crash-stress/test-${RUNNER_OS}.log" \
            "${GITHUB_SHA}" \
            | tee "operations/runtime-evidence/frontier-peer-terminal-crash-stress/verification-${RUNNER_OS}.json"

      - name: Verify observation contracts
        shell: bash
        run: |
          node --test tools/frontier-research/build-crash-stress-observation.test.mjs
          node --test tools/frontier-research/verify-crash-stress-observation.test.mjs

      - name: Upload retained evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontier-peer-terminal-crash-stress-${{ runner.os }}-${{ github.sha }}
          path: operations/runtime-evidence/frontier-peer-terminal-crash-stress/
          if-no-files-found: error
          retention-days: 30