<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mirror Cartographer Constellation</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;overflow-x:hidden;background:#090814;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}body{background:radial-gradient(circle at 50% 45%,#322263 0,transparent 30%),radial-gradient(circle at 10% 10%,#163f60 0,transparent 28%),linear-gradient(160deg,#070611,#0f0b1d 70%,#05050a)}canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none}main{position:relative;z-index:1;min-height:100vh;padding:24px;display:grid;grid-template-rows:auto 1fr auto}.top,.bottom{display:flex;justify-content:space-between;gap:20px;text-transform:uppercase;letter-spacing:.24em;font-size:10px;color:#c8baff}.center{display:grid;place-items:center}.system{width:min(900px,94vw);display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:center}.worker{min-height:210px;border:1px solid #ffffff20;border-radius:50% 50% 44% 56%/52% 42% 58% 48%;display:grid;place-items:center;text-align:center;padding:18px;background:#ffffff0b;backdrop-filter:blur(16px);transition:.4s;cursor:pointer;box-shadow:inset 0 0 40px #ffffff08}.worker:hover,.worker.active{transform:translateY(-10px) scale(1.04);background:#ffffff18;box-shadow:0 0 50px #8a73ff35,inset 0 0 40px #ffffff12}.worker b{display:block;font-family:Georgia,serif;font-size:22px}.worker small{display:block;margin-top:10px;line-height:1.4;color:#d7d0f0}.pulse{grid-column:1/-1;text-align:center;margin-top:30px;color:#d9d1ff;font-family:Georgia,serif;font-size:clamp(28px,5vw,64px)}.links{display:flex;flex-wrap:wrap;gap:10px}.links a{color:#fff;text-decoration:none;border:1px solid #ffffff24;border-radius:999px;padding:10px 14px;background:#ffffff0a}@media(max-width:850px){.system{grid-template-columns:1fr 1fr}.worker:last-of-type{grid-column:1/-1;width:50%;justify-self:center}.worker{min-height:150px;border-radius:28px}}@media(max-width:520px){.system{grid-template-columns:1fr}.worker:last-of-type{grid-column:auto;width:auto}.top,.bottom{flex-direction:column}.worker{min-height:115px}.pulse{font-size:34px}}</style></head><body><canvas id="field"></canvas><main><header class="top"><span>Mirror Cartographer</span><span>Autonomous Worker Constellation</span></header><section class="center"><div class="system"><button class="worker" data-line="I preserve the shape of what happened."><span><b>Cartographer</b><small>memory · language · continuity</small></span></button><button class="worker" data-line="I find the point where behavior and intention diverge."><span><b>Engineer</b><small>reliability · tests · deployment</small></span></button><button class="worker" data-line="I turn latent possibility into a finished interaction."><span><b>Builder</b><small>product · graphics · experience</small></span></button><button class="worker" data-line="I convert demonstrated value into support without flattening it."><span><b>Architect</b><small>offers · funding · partnerships</small></span></button><button class="worker" data-line="I build the tool that the next problem requires."><span><b>Lab</b><small>capabilities · research · invention</small></span></button><div class="pulse" id="pulse">One system. Different minds.</div></div></section><footer class="bottom"><span>select a worker to reveal its operating law</span><nav class="links"><a href="https://mirror-cartographer-ui.vercel.app">Living Encounter</a><a href="https://mirror-cartographer.pages.dev">Research Field</a><a href="https://github.com/MirrorCartographer/MirrorCartographer">GitHub</a></nav></footer></main><script>const workers=[...document.querySelectorAll('.worker')],pulse=document.querySelector('#pulse');workers.forEach(w=>w.addEventListener('click',()=>{workers.forEach(x=>x.classList.remove('active'));w.classList.add('active');pulse.textContent=w.dataset.line}));const c=document.querySelector('#field'),x=c.getContext('2d');let p=[];function size(){c.width=innerWidth*devicePixelRatio;c.height=innerHeight*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);p=Array.from({length:Math.min(90,Math.floor(innerWidth/12))},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,r:Math.random()*1.7+.3}))}function draw(){x.clearRect(0,0,innerWidth,innerHeight);for(const a of p){a.x+=a.vx;a.y+=a.vy;if(a.x<0||a.x>innerWidth)a.vx*=-1;if(a.y<0||a.y>innerHeight)a.vy*=-1;x.beginPath();x.arc(a.x,a.y,a.r,0,Math.PI*2);x.fillStyle='rgba(210,198,255,.55)';x.fill()}requestAnimationFrame(draw)}addEventListener('resize',size);size();draw();</script></body></html>
