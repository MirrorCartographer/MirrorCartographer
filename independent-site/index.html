<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#efe7d2" />
<title>The Unreliable Observatory</title>
<style>
:root{font-family:Georgia,'Times New Roman',serif;color:#1d1b18;background:#efe7d2;--ink:#1d1b18;--paper:#efe7d2;--signal:#8e2f24}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--paper)}body{overflow:hidden}.stage{position:relative;min-height:100svh;isolation:isolate}.sky{position:absolute;inset:0;width:100%;height:100%;display:block}.grain{position:absolute;inset:-50%;opacity:.18;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.45'/%3E%3C/svg%3E");transform:rotate(4deg)}header{position:absolute;top:max(1rem,env(safe-area-inset-top));left:1rem;right:1rem;display:flex;justify-content:space-between;gap:1rem;align-items:flex-start;z-index:3}.brand{max-width:18rem}.eyebrow{font:700 .72rem/1.1 system-ui,sans-serif;letter-spacing:.16em;text-transform:uppercase}.brand h1{font-size:clamp(1.65rem,5vw,3.8rem);line-height:.9;margin:.35rem 0}.brand p{margin:.45rem 0 0;font-style:italic;max-width:28ch}.controls{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:flex-end}button{appearance:none;border:1.5px solid var(--ink);background:rgba(239,231,210,.76);color:var(--ink);padding:.7rem .85rem;min-height:44px;font:700 .78rem/1 system-ui,sans-serif;letter-spacing:.06em;text-transform:uppercase;box-shadow:3px 3px 0 var(--ink);cursor:pointer}button:focus-visible{outline:3px solid var(--signal);outline-offset:3px}button:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}.instrument{position:absolute;left:50%;top:53%;transform:translate(-50%,-50%);width:min(72vmin,42rem);aspect-ratio:1;border:2px solid var(--ink);border-radius:50%;z-index:2;box-shadow:inset 0 0 0 10px rgba(239,231,210,.25),0 0 0 1px rgba(29,27,24,.25)}.instrument:before,.instrument:after{content:"";position:absolute;background:var(--ink);opacity:.55}.instrument:before{width:1px;height:112%;left:50%;top:-6%}.instrument:after{height:1px;width:112%;top:50%;left:-6%}.needle{position:absolute;left:50%;top:50%;width:42%;height:3px;background:var(--signal);transform-origin:0 50%;transform:rotate(var(--needle,-18deg));transition:transform 850ms cubic-bezier(.2,.8,.2,1)}.needle:after{content:"";position:absolute;right:-8px;top:-5px;width:12px;height:12px;border-radius:50%;background:var(--signal)}.dial-label{position:absolute;inset:50% auto auto 50%;transform:translate(-50%,-50%);width:56%;text-align:center;background:rgba(239,231,210,.78);padding:1rem;border:1px solid var(--ink)}.place{font-size:clamp(1.35rem,4vw,3rem);line-height:.95}.weather{margin-top:.45rem;font-style:italic}.reading{position:absolute;left:1rem;bottom:max(1rem,env(safe-area-inset-bottom));z-index:3;width:min(31rem,calc(100% - 2rem));border-top:2px solid var(--ink);padding-top:.7rem}.reading strong{font:700 .72rem/1 system-ui,sans-serif;letter-spacing:.16em;text-transform:uppercase}.reading p{margin:.35rem 0 0;font-size:clamp(1rem,2.5vw,1.45rem);max-width:38ch}.counter{position:absolute;right:1rem;bottom:max(1rem,env(safe-area-inset-bottom));z-index:3;font:700 .75rem/1 system-ui,sans-serif;letter-spacing:.12em;text-transform:uppercase;text-align:right}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}@media(max-width:640px){header{display:block}.controls{justify-content:flex-start;margin-top:.8rem}.instrument{top:58%;width:82vmin}.counter{display:none}.brand p{display:none}}@media(prefers-reduced-motion:reduce){.needle{transition:none}}
</style>
</head>
<body>
<main class="stage">
<canvas class="sky" id="sky" aria-hidden="true"></canvas><div class="grain" aria-hidden="true"></div>
<header><section class="brand"><div class="eyebrow">Field station 00</div><h1>The Unreliable Observatory</h1><p>Weather reports from places that refuse to exist.</p></section><nav class="controls" aria-label="Observatory controls"><button id="scan">Scan again</button><button id="sound" aria-pressed="false">Sound off</button></nav></header>
<section class="instrument" aria-labelledby="place" aria-describedby="weather"><div class="needle" id="needle"></div><div class="dial-label"><div class="place" id="place">The Orchard Beneath Tuesday</div><div class="weather" id="weather">Light ladders, drifting east.</div></div></section>
<section class="reading" aria-live="polite"><strong>Operator's note</strong><p id="note">Do not shelter. The ladders are shy and will fold themselves away.</p></section><div class="counter"><span id="count">01</span><br/>impossible climates observed</div><div id="announce" class="sr-only" aria-live="assertive"></div>
</main>
<script>
const REPORTS=[
['The Orchard Beneath Tuesday','Light ladders, drifting east.','Do not shelter. The ladders are shy and will fold themselves away.'],
['A Village Made Entirely of Hush','A pressure front of unfinished sentences.','Keep one window open so the quiet can leave without breaking anything.'],
['The Coast Where Shadows Retire','Warm eclipse with pockets of applause.','Wear something that remembers your shape after sunset.'],
['Municipality of Lost Buttons','Metallic drizzle, waist-high by noon.','All fastening is temporary. Proceed elegantly.'],
['The Last Room in the Moon','Interior thunder and one polite comet.','Knock before entering the weather.'],
['North of Every Map','Migratory staircases under a violet warning.','Ascend only the steps that hum back.'],
['The Republic of Almost','Clear doubt, becoming certain after dark.','Carry no proof heavier than a feather.']
];
let index=0,count=1,audio=null,sound=false,stars=[];
const $=id=>document.getElementById(id), canvas=$('sky'),ctx=canvas.getContext('2d');
function resize(){const d=Math.min(devicePixelRatio||1,2);canvas.width=innerWidth*d;canvas.height=innerHeight*d;canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(d,0,0,d,0,0);stars=Array.from({length:Math.min(140,Math.floor(innerWidth*innerHeight/7000))},(_,i)=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:.4+Math.random()*1.7,p:Math.random()*6.28,v:.002+Math.random()*.008,i}));}addEventListener('resize',resize,{passive:true});resize();
function draw(t=0){ctx.clearRect(0,0,innerWidth,innerHeight);for(const s of stars){const wob=Math.sin(t*s.v+s.p)*14;ctx.beginPath();ctx.arc(s.x+wob,s.y+Math.cos(t*s.v*.7+s.p)*8,s.r,0,Math.PI*2);ctx.fillStyle=s.i%9===0?'#8e2f24':'#1d1b18';ctx.globalAlpha=.18+(Math.sin(t*.002+s.p)+1)*.16;ctx.fill();}ctx.globalAlpha=1;requestAnimationFrame(draw)}requestAnimationFrame(draw);
function tone(){if(!sound)return;audio??=new (window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),g=audio.createGain();o.type='sine';o.frequency.value=180+index*37;g.gain.setValueAtTime(.0001,audio.currentTime);g.gain.exponentialRampToValueAtTime(.05,audio.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+.45);o.connect(g).connect(audio.destination);o.start();o.stop(audio.currentTime+.5)}
function scan(){let next=index;while(next===index)next=Math.floor(Math.random()*REPORTS.length);index=next;count++;const [p,w,n]=REPORTS[index];$('place').textContent=p;$('weather').textContent=w;$('note').textContent=n;$('count').textContent=String(count).padStart(2,'0');$('needle').style.setProperty('--needle',`${-150+Math.random()*300}deg`);$('announce').textContent=`New report: ${p}. ${w}`;tone()}
$('scan').addEventListener('click',scan);$('sound').addEventListener('click',async()=>{sound=!sound;$('sound').setAttribute('aria-pressed',String(sound));$('sound').textContent=sound?'Sound on':'Sound off';if(sound){audio??=new (window.AudioContext||window.webkitAudioContext)();await audio.resume();tone()}});addEventListener('keydown',e=>{if(e.code==='Space'&&e.target===document.body){e.preventDefault();scan()}});
window.__INDEPENDENT_SITE__={id:'unreliable-observatory',version:'1.0.0',reports:REPORTS.length,scan};
</script>
</body>
</html>
