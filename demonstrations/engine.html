<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mirror Cartographer — 101 Demonstration Engine</title>
<style>
:root{color-scheme:dark;--bg:#030712;--ink:#f8fafc;--dim:#a7b0c3;--line:rgba(255,255,255,.16);--panel:rgba(255,255,255,.065);--blue:#67e8f9;--pink:#f0abfc;--gold:#fde047;--green:#86efac}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 10%,rgba(240,171,252,.24),transparent 30%),radial-gradient(circle at 82% 20%,rgba(103,232,249,.18),transparent 28%),#030712;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.shell{max-width:1400px;margin:auto;padding:24px}.top{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(320px,.9fr);gap:18px;align-items:stretch}.card{border:1px solid var(--line);border-radius:30px;background:var(--panel);padding:clamp(20px,4vw,40px);box-shadow:0 24px 80px rgba(0,0,0,.3)}.eyebrow{text-transform:uppercase;letter-spacing:.18em;color:var(--blue);font-size:.76rem}h1{font-size:clamp(2.6rem,8vw,7rem);line-height:.86;letter-spacing:-.085em;margin:10px 0 18px}.lead,.card p{color:var(--dim);line-height:1.55;font-size:1.05rem}.controls{display:flex;gap:10px;flex-wrap:wrap;margin:22px 0}.controls button,.demo button,input{border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.06);color:var(--ink);padding:10px 14px;font:inherit}.controls button.active{border-color:var(--blue);background:rgba(103,232,249,.14)}input{width:100%;border-radius:18px;margin-top:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-top:18px}.demo{border:1px solid var(--line);border-radius:24px;background:rgba(0,0,0,.2);padding:18px;display:grid;gap:10px}.demo span{color:var(--gold);font-size:.8rem;letter-spacing:.12em;text-transform:uppercase}.demo h2{font-size:1.18rem;margin:0}.demo p{margin:0;color:var(--dim);line-height:1.45}.demo strong{color:var(--green);font-weight:750}.selected{position:sticky;top:20px}.big-number{font-size:5rem;line-height:.85;letter-spacing:-.08em;color:var(--gold);margin:0}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:8px 10px;color:var(--dim);margin:4px}.openmic{border-color:rgba(253,224,71,.55);background:linear-gradient(135deg,rgba(253,224,71,.12),rgba(240,171,252,.08))}@media(max-width:900px){.top{grid-template-columns:1fr}.selected{position:static}h1{font-size:clamp(2.5rem,16vw,4rem)}}</style>
</head>
<body>
<main class="shell">
<section class="top">
<div class="card">
<p class="eyebrow">Mirror Cartographer public lab</p>
<h1>101 demonstrations, one reusable engine.</h1>
<p class="lead">This is the boom: build the ability once, then reuse it. Each card is a demonstration seed with a mechanism and proof boundary. The engine makes all 101 browsable now and ready to become deeper interactive artifacts.</p>
<div class="controls" id="filters"></div>
<input id="search" placeholder="Search: animal, proof, symbol, comedy, body, money, directness..." />
</div>
<div class="card selected" id="selected"></div>
</section>
<section class="grid" id="grid"></section>
</main>
<script>
const expeditions=['All','Understanding','Memory','Body','Animals','Research','Symbols','AI','Creative','Public Value','Future'];
const groups={
'Understanding':['Can a scattered archive become a map of understanding?','Can a vague feeling become a usable structure?','Can information be separated from understanding?','Can a thought change after being held?','Can contradiction become navigable terrain?','Can the hidden hinge in a messy problem be found?','Can confusion become a better next action?','Can directness change the landscape?','Can quality of experience be mapped before and after reflection?','Can a belief be version-controlled?'],
'Memory':['Can project continuity survive fragmented chats?','Can context survive across months?','Can hidden assumptions behind a decision be recovered?','Can a timeline explain why the present feels this way?','Can repeated phrases become continuity anchors?','Can a project recover after account deletion or archive fracture?','Can a living source manifest guide a project?','Can memory be treated like fossil evidence?','Can private source and public signal be separated?','Can a map be exported for another person to inspect?'],
'Body':['Can symptom fragments become a clinician packet?','Can body sensation be separated from diagnosis?','Can eye, head, neck, and posture signals be mapped together?','Can autonomic episodes become visible as a pattern?','Can labs be preserved without overinterpreting them?','Can posture and gait be mapped as system interactions?','Can medical uncertainty become better questions?','Can objective findings be compared with lived experience?','Can red flags be separated from non-urgent signals?','Can a body map show what it cannot prove?'],
'Animals':['Can scattered pet history become one timeline?','Can FIV uncertainty be mapped without fake cure claims?','Can lymph nodes be separated from one diagnostic label?','Can glaucoma and heart context be tracked together?','Can a medication reaction become decision memory?','Can household cat skin issues be mapped as exposure terrain?','Can a vet question packet improve advocacy?','Can urgent animal signs be separated from research questions?','Can vet portal exports become structured events?','Can animal advocacy be treated as continuity work?'],
'Research':['Can fact, inference, speculation, symbol, and action remain separate?','Can a research question become a roadmap?','Can contradictions be held without collapsing them?','Can a bold claim pass through an evidence gate?','Can a hypothesis list what would disprove it?','Can a cure idea become experiments needed?','Can a source-boundary card stop overclaiming?','Can confidence change over revisions?','Can invisible forces be inferred responsibly?','Can elegance be blocked from replacing reality?'],
'Symbols':['Can chair, Char, eye, and light become interface primitives?','Can Lyr and Glyph be distinguished?','Can symbol become navigation instead of decoration?','Can eye and light show interaction?','Can a symbol glossary stay changeable?','Can color, texture, and body language become structured inputs?','Can metaphor show its overreach boundary?','Can repeated signals produce field glyphs?','Can symbols help memory without forcing belief?','Can a symbol become an action?'],
'AI':['Can AI act as cartographer rather than oracle?','Can model uncertainty improve trust?','Can user correction update the map?','Can a failed assistant response become a requirement?','Can answer-machine and exploration-guide behavior be compared?','Can AI overreach be audited in public?','Can co-created authorship be handled accurately?','Can tool limits become design constraints?','Can prolonged dialogue create qualitatively different insight?','Can AI keep building a coherent model without pretending consciousness?'],
'Creative':['Can a song request become a life-map signal?','Can visual motifs become an atlas?','Can proof become a film structure?','Can humor map social cognition?','Can taste be treated as discernment?','Can a website become a museum-like place?','Can boredom become redesign data?','Can a symbolic music room hold meaning?','Can art compress architecture?','Can home, ocean, travel, family, and animals become future terrain?'],
'Public Value':['Can Mirror Cartographer be offered publicly without flattening it?','Can value be shown as reduced complexity cost?','Can a continuity packet be a paid artifact?','Can barter become a legitimate exchange lane?','Can the project identify who would care and why?','Can a proof beat a pitch?','Can public GitHub become a doorway?','Can a collaborator invitation be specific enough to attract the right person?','Can a money path avoid fake guarantees?','Can one artifact become worth discussing?'],
'Future':['Can dark matter function as an analogy for invisible structure?','Can a world be modeled as relationships instead of pages?','Can a website reward long exploration?','Can a reusable demonstration engine make 101 demos practical?','Can 100 demos become a dependency graph?','Can understanding become an environment?','Can love be modeled as sustained attention and care over time?','Can shared reality become a room?','Can the archive become a research vessel?','Can the system call the things that want it?','Open Mic Comedy Club — can humor test understanding?']
};
const data=[];let counter=1;Object.entries(groups).forEach(([exp,items])=>items.forEach(title=>data.push({id:counter++,exp,title,mechanism:mechanismFor(exp,title)})));
function mechanismFor(exp,title){if(title.includes('Comedy'))return'Jokes, bits, roasts, callbacks, timing, and perspective shifts become a test of social cognition and shared reality.';if(exp==='Animals')return'Records, symptoms, timing, meds, source status, urgency, and next vet questions become a navigable packet.';if(exp==='Body')return'Lived sensation and objective evidence are preserved together without pretending the map is a diagnosis.';if(exp==='Research')return'Claims pass through evidence, contradiction, source boundary, confidence, and failure-mode gates.';if(exp==='Symbols')return'A symbol is treated as a navigational object with memory links, evidence boundaries, and action paths.';if(exp==='AI')return'Human correction, model uncertainty, tool limits, and co-authorship are made visible instead of hidden.';if(exp==='Creative')return'Aesthetic fragments become compressed architecture: music, image, humor, and home as maps.';if(exp==='Public Value')return'The visitor sees a capability rather than a slogan: complexity becomes more usable.';if(exp==='Future')return'The site becomes a place to explore possible forms of understanding, not just pages to read.';return'Fragments are transformed into relationships, relationships into maps, and maps into grounded next actions.'}
let active='All', selected=data[100];
function renderFilters(){document.getElementById('filters').innerHTML=expeditions.map(x=>`<button class="${x===active?'active':''}" onclick="active='${x}';render()">${x}</button>`).join('')}
function renderSelected(){document.getElementById('selected').innerHTML=`<p class="eyebrow">selected demonstration</p><p class="big-number">${String(selected.id).padStart(3,'0')}</p><h2>${selected.title}</h2><p><span class="pill">${selected.exp}</span></p><p>${selected.mechanism}</p><p><strong>Proof boundary:</strong> this demo shows a structured capability, not a universal claim.</p><p><strong>Next build:</strong> add source examples, interaction, before/after state, and exportable artifact.</p>`}
function renderGrid(){const q=document.getElementById('search').value.toLowerCase();const rows=data.filter(d=>(active==='All'||d.exp===active)&&(`${d.title} ${d.exp} ${d.mechanism}`.toLowerCase().includes(q)));document.getElementById('grid').innerHTML=rows.map(d=>`<article class="demo ${d.id===101?'openmic':''}"><span>${String(d.id).padStart(3,'0')} · ${d.exp}</span><h2>${d.title}</h2><p>${d.mechanism}</p><button onclick="selected=data.find(x=>x.id===${d.id});renderSelected();scrollTo({top:0,behavior:'smooth'})">inspect</button></article>`).join('')}
function render(){renderFilters();renderSelected();renderGrid()}document.getElementById('search').addEventListener('input',renderGrid);render();
</script>
</body>
</html>
